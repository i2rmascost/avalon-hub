<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Avalon Hub - ระบบบัญชาการสถิติและผลรางวัลระดับองค์กร">
    <meta name="theme-color" content="#111827">
    <title>Avalon Hub - Master Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-enter { opacity: 0; transform: translate(-50%, -1rem); }
        .toast-enter-active { transition: all 0.3s ease-out; }
        .toast-leave-active { transition: all 0.2s ease-in; opacity: 0; transform: translate(-50%, -1rem); }
        .ai-glow { animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow {
            from { box-shadow: 0 0 5px #3b82f6, 0 0 10px #3b82f6; }
            to { box-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6; }
        }
        .pending-pulse { animation: pulse-opacity 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-opacity {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased overflow-hidden" 
      x-data="avalonApp()" 
      @keydown.ctrl.r.prevent="!isSyncing && syncData()"
      @keydown.meta.r.prevent="!isSyncing && syncData()">

    <!-- Toast Notification -->
    <div x-show="notification.show" 
         x-transition:enter="toast-enter-active" x-transition:enter-start="toast-enter"
         x-transition:leave="toast-leave-active" x-transition:leave-end="toast-enter"
         class="fixed top-16 left-1/2 transform -translate-x-1/2 z-[60] px-4 py-2 rounded shadow-lg font-semibold flex items-center gap-2 border border-gray-700"
         :class="notification.type === 'error' ? 'bg-red-900 text-red-100' : (notification.type === 'warning' ? 'bg-yellow-600 text-white' : 'bg-green-800 text-green-100')"
         role="alert" aria-live="assertive">
         <span x-text="notification.message"></span>
    </div>

    <!-- Header -->
    <header class="fixed top-0 w-full bg-gray-800 shadow-md z-50 flex justify-between items-center px-4 py-3 border-b border-gray-700 overflow-x-auto no-scrollbar">
        <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 focus:outline-none flex-shrink-0 mr-4" tabindex="0">AVALON HUB</h1>
        
        <div class="flex items-center gap-2 sm:gap-3 text-sm flex-nowrap min-w-max">
            <div class="hidden xl:block text-gray-500 mr-2" aria-label="เวลาอัปเดตล่าสุด">
                อัปเดต: <span x-text="lastSyncTime" class="font-mono text-gray-300"></span>
            </div>
            
            <!-- THE AXIOM: ฟีเจอร์ AI ที่สอดคล้องกับสถิติ -->
            <button @click="!isSyncing && analyzeFrequency()" :disabled="isSyncing || lotteriesData.length === 0" aria-label="สแกนความถี่ตัวเลข" 
                    class="bg-indigo-900/60 hover:bg-indigo-800 border border-indigo-500/50 disabled:bg-gray-800 disabled:border-gray-700 disabled:text-gray-500 text-indigo-300 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-indigo-400">
                <span class="hidden md:inline">สแกนความถี่</span> 🔍
            </button>

            <button @click="!isSyncing && analyzeLuckyPicks()" :disabled="isSyncing || lotteriesData.length === 0" aria-label="เก็งเลขเด็ด" 
                    class="bg-red-900/60 hover:bg-red-800 border border-red-500/50 disabled:bg-gray-800 disabled:border-gray-700 disabled:text-gray-500 text-red-300 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-red-400">
                <span class="hidden md:inline">เก็งเทรนด์เลข</span> 🎯
            </button>

            <button @click="!isSyncing && analyzeMarketSummary()" :disabled="isSyncing || lotteriesData.length === 0" aria-label="วิเคราะห์ภาพรวมตลาด" 
                    class="bg-purple-900/60 hover:bg-purple-800 border border-purple-500/50 disabled:bg-gray-800 disabled:border-gray-700 disabled:text-gray-500 text-purple-300 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-purple-400">
                <span class="hidden sm:inline">สรุปตลาด</span> ✨
            </button>

            <button @click="!isSyncing && syncData()" :disabled="isSyncing" aria-label="ซิงค์ข้อมูลผลรางวัล" 
                    class="bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-white">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" :class="isSyncing ? 'animate-spin text-white' : 'text-white'" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                <span x-text="isSyncing ? 'ซิงค์...' : 'อัปเดต'" class="hidden sm:inline"></span>
            </button>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <nav class="fixed top-[52px] w-full bg-gray-900 z-40 border-b border-gray-700" aria-label="Main Navigation">
        <div class="flex justify-center gap-8 py-2" role="tablist">
            <button id="tab-results" @click="activeTab = 'results'" role="tab" :aria-selected="activeTab === 'results'" 
                    :class="activeTab === 'results' ? 'text-blue-400 border-blue-400' : 'text-gray-400 border-transparent'" 
                    class="pb-1 font-semibold border-b-2 transition focus:outline-none focus:text-blue-300">ผลรางวัลแบ่งกลุ่ม</button>
            <button id="tab-timeline" @click="activeTab = 'timeline'" role="tab" :aria-selected="activeTab === 'timeline'" 
                    :class="activeTab === 'timeline' ? 'text-yellow-400 border-yellow-400' : 'text-gray-400 border-transparent'" 
                    class="pb-1 font-semibold border-b-2 transition focus:outline-none focus:text-yellow-300">กระดานเวลา ⏳</button>
            <button id="tab-flows" @click="activeTab = 'flows'" role="tab" :aria-selected="activeTab === 'flows'" 
                    :class="activeTab === 'flows' ? 'text-green-400 border-green-400' : 'text-gray-400 border-transparent'" 
                    class="pb-1 font-semibold border-b-2 transition focus:outline-none focus:text-green-300">สถิติเลขไหล</button>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="flex pt-[100px] h-screen overflow-hidden">
        
        <!-- Sidebar (แสดงเฉพาะ Tab ที่แบ่งกลุ่ม) -->
        <nav x-show="activeTab !== 'timeline'" class="w-32 md:w-48 flex-shrink-0 bg-gray-800 border-r border-gray-700 h-full overflow-y-auto no-scrollbar pb-20">
            <ul class="p-2 space-y-1" role="list">
                <template x-for="category in categories" :key="category.id">
                    <li>
                        <button @click="scrollTo(category.id)" 
                                class="w-full text-left px-3 py-2 text-sm rounded hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition truncate" 
                                x-text="category.name" :title="category.name"></button>
                    </li>
                </template>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-4 pb-24 scroll-smooth bg-gray-900" id="main-scroll-area">
            
            <!-- TAB 1: ผลรางวัลแบ่งกลุ่ม -->
            <section id="panel-results" x-show="activeTab === 'results'" role="tabpanel">
                <template x-if="isSyncing && lotteriesData.length === 0">
                    <div class="space-y-6">
                        <div class="h-8 bg-gray-800 rounded w-1/4 animate-pulse"></div>
                        <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700">
                            <div class="h-10 bg-[#8b0000] animate-pulse"></div>
                            <div class="h-12 border-b border-gray-700 animate-pulse"></div>
                        </div>
                    </div>
                </template>

                <template x-if="lotteriesData.length > 0">
                    <div>
                        <template x-for="category in categories" :key="category.id">
                            <div :id="'results-' + category.id" class="mb-10 pt-2" x-show="getLotteriesByCategory(category.id).length > 0">
                                <h2 class="text-xl font-bold mb-4 text-blue-300" x-text="category.name"></h2>
                                
                                <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700 shadow-lg">
                                    <div class="bg-[#8b0000] text-white flex items-center px-4 py-2 font-bold text-sm md:text-base border-b border-red-900">
                                        <div class="flex-1">รายการหวย</div>
                                        <div class="w-20 md:w-32 text-center">3 ตัวบน</div>
                                        <div class="w-20 md:w-32 text-center">2 ตัวล่าง</div>
                                        <div class="w-16 text-center">สถานะ</div> 
                                    </div>

                                    <div class="divide-y divide-gray-700">
                                        <template x-for="lotto in getLotteriesByCategory(category.id)" :key="lotto.id">
                                            <div class="flex items-center px-4 py-3 transition group bg-gray-800 even:bg-gray-800/50"
                                                 :class="lotto.risk === 'WAIT' ? 'opacity-80' : 'hover:bg-gray-750'">
                                                
                                                <div class="flex-1 flex items-center gap-2 md:gap-3 min-w-0">
                                                    <span class="text-lg md:text-xl drop-shadow-md" x-text="getFlag(lotto.name)"></span>
                                                    <span class="font-semibold text-gray-200 text-sm md:text-base truncate" x-text="lotto.name" :title="lotto.name"></span>
                                                    <span class="bg-gray-900 text-gray-400 text-[10px] md:text-xs px-2 py-0.5 rounded-full font-mono border border-gray-700 shadow-inner flex-shrink-0" x-text="lotto.time"></span>
                                                </div>

                                                <div class="w-20 md:w-32 text-center">
                                                    <span class="font-bold text-lg md:text-xl font-mono tracking-wider drop-shadow-[0_0_2px_rgba(255,255,255,0.8)]" 
                                                          :class="lotto.top3 === '***' ? 'text-gray-600 pending-pulse' : 'text-red-400'" 
                                                          x-text="lotto.top3"></span>
                                                </div>

                                                <div class="w-20 md:w-32 text-center">
                                                    <span class="font-bold text-lg md:text-xl font-mono tracking-wider drop-shadow-[0_0_2px_rgba(255,255,255,0.8)]" 
                                                          :class="lotto.bottom2 === '**' ? 'text-gray-600 pending-pulse' : 'text-blue-400'" 
                                                          x-text="lotto.bottom2"></span>
                                                </div>

                                                <div class="w-16 text-right flex justify-end items-center gap-2">
                                                    <template x-if="lotto.risk !== 'WAIT'">
                                                        <button @click="analyzeLottoWithAI(lotto, 'result')" 
                                                                class="text-purple-400 hover:text-purple-300 bg-purple-900/30 hover:bg-purple-900/50 p-1.5 rounded transition opacity-70 group-hover:opacity-100 focus:outline-none" 
                                                                title="วิเคราะห์ดวงดาวด้วย AI">
                                                            ✨
                                                        </button>
                                                    </template>
                                                    <template x-if="lotto.risk === 'WAIT'">
                                                        <span class="text-gray-600 text-xs flex items-center justify-center w-full" title="กำลังรอข้อมูลอัปเดต">
                                                            <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                                        </span>
                                                    </template>
                                                </div>

                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </section>

            <!-- THE AXIOM: TAB 2 ใหม่ - กระดานเวลารวม (Master Timeline) -->
            <section id="panel-timeline" x-show="activeTab === 'timeline'" role="tabpanel" style="display: none;">
                <div class="mb-4 pt-2 flex justify-between items-center border-b border-gray-700 pb-2">
                    <h2 class="text-xl font-bold text-yellow-400">กระดานเวลารวม (Master Timeline)</h2>
                    <span class="text-sm text-gray-400" x-text="`ทั้งหมด ${lotteriesData.length} รายการ`"></span>
                </div>

                <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700 shadow-lg mb-8">
                    <div class="bg-gradient-to-r from-yellow-900 to-yellow-800 text-white flex items-center px-4 py-3 font-bold text-sm md:text-base border-b border-yellow-700">
                        <div class="flex-1">เวลา / รายการ</div>
                        <div class="w-20 md:w-32 text-center">3 ตัวบน</div>
                        <div class="w-20 md:w-32 text-center">2 ตัวล่าง</div>
                        <div class="w-10 text-center"></div> 
                    </div>

                    <div class="divide-y divide-gray-700">
                        <template x-for="lotto in getAllLotteriesSortedByTime()" :key="'tl-'+lotto.id">
                            <div class="flex items-center px-4 py-2.5 transition group bg-gray-800 even:bg-gray-800/50 hover:bg-gray-750"
                                 :class="lotto.risk === 'WAIT' ? 'opacity-70' : ''">
                                
                                <div class="flex-1 flex items-center gap-2 md:gap-3 min-w-0">
                                    <span class="bg-yellow-900/50 text-yellow-400 text-[10px] md:text-xs px-2 py-1 rounded font-mono border border-yellow-700/50 flex-shrink-0" x-text="lotto.time"></span>
                                    <span class="text-lg md:text-xl drop-shadow-md" x-text="getFlag(lotto.name)"></span>
                                    <span class="font-semibold text-gray-200 text-sm md:text-base truncate" x-text="lotto.name" :title="lotto.name"></span>
                                    
                                    <!-- Label หมวดหมู่แบบย่อ -->
                                    <span class="hidden lg:inline-block text-[9px] px-1.5 py-0.5 bg-gray-700 text-gray-400 rounded-full border border-gray-600 truncate max-w-[80px]" x-text="getCategoryName(lotto.categoryId).replace(' (เรียงตามเวลา)','')"></span>
                                </div>

                                <div class="w-20 md:w-32 text-center">
                                    <span class="font-bold text-lg md:text-xl font-mono tracking-wider" 
                                          :class="lotto.top3 === '***' ? 'text-gray-600' : 'text-red-400 drop-shadow-[0_0_2px_rgba(255,255,255,0.8)]'" 
                                          x-text="lotto.top3"></span>
                                </div>

                                <div class="w-20 md:w-32 text-center">
                                    <span class="font-bold text-lg md:text-xl font-mono tracking-wider" 
                                          :class="lotto.bottom2 === '**' ? 'text-gray-600' : 'text-blue-400 drop-shadow-[0_0_2px_rgba(255,255,255,0.8)]'" 
                                          x-text="lotto.bottom2"></span>
                                </div>

                                <div class="w-10 text-right">
                                    <template x-if="lotto.risk !== 'WAIT'">
                                        <button @click="analyzeLottoWithAI(lotto, 'result')" 
                                                class="text-purple-400 hover:text-purple-300 bg-purple-900/30 hover:bg-purple-900/50 p-1.5 rounded transition opacity-50 group-hover:opacity-100 focus:outline-none">
                                            ✨
                                        </button>
                                    </template>
                                </div>

                            </div>
                        </template>
                    </div>
                </div>
            </section>

            <!-- TAB 3: เลขไหลแบบละเอียด -->
            <section id="panel-flows" x-show="activeTab === 'flows'" role="tabpanel" style="display: none;">
                <template x-for="category in categories" :key="category.id">
                    <div :id="'flows-' + category.id" class="mb-8 pt-2" x-show="getLotteriesByCategory(category.id).filter(l => l.risk !== 'WAIT').length > 0">
                        <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2 text-green-300" x-text="category.name"></h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <template x-for="lotto in getLotteriesByCategory(category.id).filter(l => l.risk !== 'WAIT')" :key="'flow-'+lotto.id">
                                <div class="bg-gray-800 rounded-lg p-3 border border-gray-700 flex flex-col gap-2 relative">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center gap-2">
                                            <span x-text="getFlag(lotto.name)"></span>
                                            <span class="font-semibold text-gray-200" x-text="lotto.name"></span>
                                        </div>
                                        <button @click="analyzeLottoWithAI(lotto, 'flow')" class="text-[10px] bg-purple-900/50 hover:bg-purple-800 text-purple-300 border border-purple-700 px-2 py-0.5 rounded transition">
                                            เจาะลึก 🔮
                                        </button>
                                    </div>
                                    <div class="flex gap-2 w-full justify-between mt-1">
                                        <div class="bg-gray-900 px-2 py-1 rounded border border-gray-700 text-center flex-1">
                                            <div class="text-[9px] text-gray-500">ล่าสุด</div>
                                            <div class="text-sm font-bold text-green-400" x-text="lotto.flow_today.join('-') || '-'"></div>
                                        </div>
                                        <div class="bg-gray-900 px-2 py-1 rounded border border-gray-700 text-center flex-1">
                                            <div class="text-[9px] text-gray-500">อดีต</div>
                                            <div class="text-sm font-bold text-blue-400" x-text="lotto.flow_history.join('-') || '-'"></div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </section>

        </main>
    </div>

    <!-- AI Modal Overlay -->
    <div x-show="aiModal.show" style="display: none;"
         class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
        
        <div class="bg-gray-800 border border-purple-500/50 shadow-2xl rounded-xl max-w-md w-full overflow-hidden flex flex-col"
             @click.outside="closeAIModal()">
            <div class="bg-gradient-to-r from-gray-900 to-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
                <h3 class="text-lg font-bold text-purple-400 flex items-center gap-2">
                    <span class="animate-pulse" x-text="aiModal.mode === 'summary' ? '🌍' : (aiModal.mode === 'lucky' ? '🎯' : (aiModal.mode === 'scan' ? '🔍' : (aiModal.mode === 'flow' ? '🔮' : '✨')))"></span> 
                    <span x-text="aiModal.title">The Axiom Oracle</span>
                </h3>
                <button @click="closeAIModal()" class="text-gray-400 hover:text-white transition focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-5 min-h-[150px] max-h-[60vh] overflow-y-auto bg-gray-900 relative">
                <div x-show="aiModal.loading" class="flex flex-col items-center justify-center h-full space-y-3 py-6">
                    <div class="w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full animate-spin ai-glow"></div>
                    <p class="text-sm text-purple-300 animate-pulse">กำลังประมวลผลดวงดาวและเส้นสายสถิติ...</p>
                </div>
                <div x-show="!aiModal.loading" class="text-gray-200 text-sm leading-relaxed whitespace-pre-wrap" x-text="aiModal.content"></div>
            </div>
            
            <div class="bg-gray-800 p-3 border-t border-gray-700 flex justify-between items-center">
                <button @click="playAIAudio()" :disabled="aiModal.loading || !aiModal.content || aiModal.audioLoading" 
                        class="px-3 py-1.5 bg-indigo-900/50 hover:bg-indigo-800 text-indigo-300 border border-indigo-700 rounded text-sm font-semibold transition flex items-center gap-2 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed">
                    <template x-if="aiModal.audioLoading">
                        <svg class="w-4 h-4 animate-spin text-indigo-300" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </template>
                    <template x-if="!aiModal.audioLoading">
                        <span>🔊</span>
                    </template>
                    <span x-text="aiModal.audioLoading ? 'กำลังสร้างเสียง...' : 'ฟังเสียง'"></span>
                </button>

                <button @click="closeAIModal()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-gray-500">
                    ปิดหน้าต่าง
                </button>
            </div>
        </div>
    </div>

    <script>
        function createWavFile(pcmUint8Array, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmUint8Array.length;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

                        container.scrollTo({ top: element.offsetTop - 120, behavior: 'smooth' });
                    }
                },

                closeAIModal() {
                    this.aiModal.show = false;
                    if(this.countdown < 5) this.countdown = 5; 
                },

                async fetchGeminiWithRetry(prompt) {
                    const apiKey = ""; 
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { 
                            parts: [{ 
                                text: "คุณคือ 'Axiom Oracle' ผู้เชี่ยวชาญด้านสถิติตัวเลข ตอบกลับด้วยภาษาไทยที่เป็นมืออาชีพ สั้น กระชับ ชี้ให้เห็นทิศทางและแนวโน้มที่น่าสนใจตามหลักความน่าจะเป็น" 
                            }] 
                        }
                    };

                    const delays = [1000, 2000, 4000, 8000, 16000];
                    for (let i = 0; i <= delays.length; i++) {
                        try {
                            const response = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                            const data = await response.json();
                            return data.candidates?.[0]?.content?.parts?.[0]?.text || "ดวงดาวสับสน ไม่สามารถดึงคำทำนายได้";
                        } catch (err) {
                            if (i === delays.length) throw err;
                            await new Promise(res => setTimeout(res, delays[i]));
                        }
                    }
                },

                async analyzeLottoWithAI(lotto, mode) {
                    this.aiModal.title = mode === 'flow' ? `ทำนายเลขไหล: ${lotto.name}` : lotto.name;
                    this.aiModal.content = '';
                    this.aiModal.loading = true;
                    this.aiModal.mode = mode;
                    this.aiModal.show = true;

                    let prompt = '';
                    if (mode === 'flow') {
                        prompt = `โปรดวิเคราะห์ความน่าจะเป็นของ "เลขไหล" สำหรับ "${lotto.name}": สถิติไหลล่าสุดคือ ${lotto.flow_today.join('-') || 'N/A'} และในอดีตคือ ${lotto.flow_history.join('-') || 'N/A'}. 
                        จากชุดตัวเลขเหล่านี้ มีเลขไหนหรือกลุ่มตัวเลขใดที่มีโอกาส (Trending) จะปรากฏในรอบถัดไปบ้าง? ช่วยให้คำแนะนำเชิงสถิติสั้นๆ`;
                    } else {
                        prompt = `ช่วยวิเคราะห์สถิติของ "${lotto.name}" ในวันนี้: 3 ตัวบนคือ ${lotto.top3}, 2 ตัวล่างคือ ${lotto.bottom2}. ทิศทางตัวเลขแบบนี้บ่งบอกความสวิงหรือความเสถียรอย่างไรบ้าง?`;
                    }

                    try {
                        const result = await this.fetchGeminiWithRetry(prompt);
                        this.aiModal.content = result;
                    } catch (error) {
                        this.aiModal.content = "เกิดสัญญาณแทรกซ้อนจากการเชื่อมต่อ AI โปรดลองใหม่อีกครั้ง";
                    } finally {
                        this.aiModal.loading = false;
                    }
                },

                async analyzeMarketSummary() {
                    this.aiModal.title = 'ภาพรวมตลาดประจำวัน (Market Summary)';
                    this.aiModal.content = '';
                    this.aiModal.loading = true;
                    this.aiModal.mode = 'summary';
                    this.aiModal.show = true;

                    const availableData = this.lotteriesData.filter(l => l.risk !== 'WAIT');
                    const summaryData = availableData.map(l => `${l.name}: บน ${l.top3}, ล่าง ${l.bottom2}`).join(' | ');
                    
                    const prompt = `นี่คือข้อมูลดัชนีและผลรางวัลที่ออกแล้วในขณะนี้:\n${summaryData || 'ยังไม่มีข้อมูลผลรางวัลในระบบ'}\n\nในฐานะนักวิเคราะห์ ช่วยสรุปภาพรวมของตลาดในวันนี้ให้หน่อยครับ (เช่น ตลาดโซนไหนมีความผันผวนผิดปกติ) สรุปภาพรวมให้กระชับ เข้าใจง่าย ไม่เกิน 4 ประโยค`;

                    try {

                    } catch (error) {
                        this.aiModal.content = "เกิดสัญญาณแทรกซ้อน ไม่สามารถสรุปภาพรวมได้ในขณะนี้";
                    } finally {
                        this.aiModal.loading = false;
                    }
                },

                async analyzeLuckyPicks() {
                    this.aiModal.title = 'เจาะลึกเทรนด์ตัวเลข (Trending Picks)';
                    this.aiModal.content = '';
                    this.aiModal.loading = true;
                    this.aiModal.mode = 'lucky';
                    this.aiModal.show = true;

                    const availableData = this.lotteriesData.filter(l => l.risk !== 'WAIT');
                    const flowSummary = availableData.map(l => `${l.name}: ล่าสุด ${l.flow_today.join('')}`).join(', ');
                    
                    const prompt = `จากสถิติเลขไหลล่าสุดของตลาดทั้งหมดวันนี้:\n${flowSummary || 'ยังไม่มีข้อมูลในระบบ'}\n\nในฐานะ 'Axiom Oracle' เซียนสถิติขั้นเทพ ช่วยคำนวณหา "กลุ่มตัวเลข" 3 ชุด (ชุดละ 2-3 ตัว) ที่มีความถี่ในการไหลสูงสุดในรอบนี้ พร้อมบอกเหตุผลเชิงสถิติสั้นๆ 1 บรรทัดต่อชุด ว่าทำไมโมเดลถึงเลือกเลขนี้`;

                    try {
                        const result = await this.fetchGeminiWithRetry(prompt);

                    } catch (error) {
                        this.aiModal.content = "เกิดสัญญาณแทรกซ้อน ไม่สามารถดึงเทรนด์เลขได้ในขณะนี้";
                    } finally {
                        this.aiModal.loading = false;
                    }
                },

                // THE AXIOM: AI Frequency Scanner Engine (สแกนความถี่ตัวเลข)
                async analyzeFrequency() {
                    this.aiModal.title = 'สแกนความถี่ตัวเลข (Frequency Scanner)';
                    this.aiModal.content = '';
                    this.aiModal.loading = true;
                    this.aiModal.mode = 'scan';
                    this.aiModal.show = true;

                    // สกัดข้อมูลตัวเลขทั้งหมดที่ออกผลแล้ว (เจาะไปที่ 2 ตัวล่าง และเลขท้ายของ 3 ตัวบน)
                    const availableData = this.lotteriesData.filter(l => l.risk !== 'WAIT');
                    let rawNumbers = [];
                    availableData.forEach(l => {
                        rawNumbers.push(l.top3);
                        rawNumbers.push(l.bottom2);
                    });
                    
                    const numbersList = rawNumbers.join(', ');
                    
                    const prompt = `นี่คือชุดตัวเลขผลรางวัลทั้งหมดที่ถูกดึงมาจากกระดานวันนี้:\n${numbersList || 'ยังไม่มีตัวเลข'}\n\nหน้าที่ของคุณคือการ "สแกนหาความถี่" ของเลขโดด (0-9) หรือเลขคู่ (เช่น 22, 56) ที่ปรากฏซ้ำมากที่สุดในข้อมูลชุดนี้ \n\nช่วยสรุปให้หน่อยว่า:\n1. เลขไหนคือ "เลขแข็ง" (ปรากฏบ่อยสุด) ประจำวันนี้\n2. เลขไหนคือ "เลขอ่อน" (แทบไม่ปรากฏเลย)\nตอบเชิงสถิติ สั้น กระชับ และดูเป็นมืออาชีพครับ`;

                    try {
                        const result = await this.fetchGeminiWithRetry(prompt);
                        this.aiModal.content = result;
                    } catch (error) {
                        this.aiModal.content = "เกิดสัญญาณแทรกซ้อน ไม่สามารถสแกนความถี่ได้ในขณะนี้";
                    } finally {
                        this.aiModal.loading = false;
                    }
                },

                async playAIAudio() {
                    if (!this.aiModal.content || this.aiModal.audioLoading) return;
                    this.aiModal.audioLoading = true;

                    try {
                        const apiKey = ""; 
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
                        
                        const payload = {
                            contents: [{ parts: [{ text: "การวิเคราะห์จาก THE AXIOM ระบุว่า: " + this.aiModal.content }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            },
                            model: "gemini-2.5-flash-preview-tts"
                        };

                        const delays = [1000, 2000, 4000, 8000, 16000];
                        let responseData = null;
                        
                        for (let i = 0; i <= delays.length; i++) {
                            try {
                                const response = await fetch(url, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(payload)
                                });
                                if (!response.ok) throw new Error("TTS API Error");
                                responseData = await response.json();
                                break;
                            } catch (err) {
                                if (i === delays.length) throw err;
                                await new Promise(res => setTimeout(res, delays[i]));
                            }
                        }

                        const inlineData = responseData.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                        if (inlineData && inlineData.data) {
                            const base64Data = inlineData.data;
                            const mimeType = inlineData.mimeType || "audio/L16;rate=24000";
                            
                            let sampleRate = 24000;
                            const match = mimeType.match(/rate=(\d+)/);
                            if (match) sampleRate = parseInt(match[1]);

                            const binaryStr = atob(base64Data);
                            const pcmBytes = new Uint8Array(binaryStr.length);
                            for (let i = 0; i < binaryStr.length; i++) {
                                pcmBytes[i] = binaryStr.charCodeAt(i);
                            }

                            const wavBuffer = createWavFile(pcmBytes, sampleRate);
                            const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                            const audioUrl = URL.createObjectURL(blob);
                            const audio = new Audio(audioUrl);
                            
                            audio.play();
                        } else {
                            throw new Error("Invalid Audio Format");
                        }
                    } catch (error) {
                        console.error("Audio Engine Error:", error);
                        this.showToast("ระบบเสียงพยากรณ์ขัดข้อง โปรดลองใหม่", "error");
                    } finally {
                        this.aiModal.audioLoading = false;
                    }
                }
            }));
        });
