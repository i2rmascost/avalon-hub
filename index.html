<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Avalon Hub - ระบบบัญชาการสถิติและผลรางวัลระดับองค์กร">
    <meta name="theme-color" content="#111827">
    <title>Avalon Hub - Master Dashboard</title>
    
    <!-- นำเข้า Tailwind CSS และ Alpine.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- ฝัง Style ไว้ในไฟล์เดียวตามกฎ Single-File Mandate -->
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-enter { opacity: 0; transform: translate(-50%, -1rem); }
        .toast-enter-active { transition: all 0.3s ease-out; }
        .toast-leave-active { transition: all 0.2s ease-in; opacity: 0; transform: translate(-50%, -1rem); }
        .ai-glow { animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow {
            from { box-shadow: 0 0 5px #3b82f6, 0 0 10px #3b82f6; }
            to { box-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6; }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased overflow-hidden" 
      x-data="avalonApp()" 
      @keydown.ctrl.r.prevent="!isSyncing && syncData()"
      @keydown.meta.r.prevent="!isSyncing && syncData()">

    <!-- Toast Notification -->
    <div x-show="notification.show" 
         x-transition:enter="toast-enter-active" x-transition:enter-start="toast-enter"
         x-transition:leave="toast-leave-active" x-transition:leave-end="toast-enter"
         class="fixed top-16 left-1/2 transform -translate-x-1/2 z-[60] px-4 py-2 rounded shadow-lg font-semibold flex items-center gap-2 border border-gray-700"
         :class="notification.type === 'error' ? 'bg-red-900 text-red-100' : (notification.type === 'warning' ? 'bg-yellow-600 text-white' : 'bg-green-800 text-green-100')"
         role="alert" aria-live="assertive">
         <span x-text="notification.message"></span>
    </div>

    <!-- Header & Sync Control -->
    <header class="fixed top-0 w-full bg-gray-800 shadow-md z-50 flex justify-between items-center px-4 py-3 border-b border-gray-700">
        <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 focus:outline-none" tabindex="0">AVALON HUB</h1>
        <div class="flex items-center gap-4 text-sm">
            <div class="hidden md:block text-gray-500" aria-label="เวลาอัปเดตล่าสุด">
                อัปเดตล่าสุด: <span x-text="lastSyncTime" class="font-mono text-gray-300"></span>
            </div>
            <div class="text-gray-400" aria-live="polite">
                รีเฟรชใน: <span x-text="countdown" class="font-mono font-bold transition-colors" :class="countdown <= 10 ? 'text-red-400' : 'text-yellow-400'"></span> วิ.
            </div>
            
            <button @click="!isSyncing && syncData()" :disabled="isSyncing" aria-label="ซิงค์ข้อมูลผลรางวัล" 
                    class="bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-white">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" :class="isSyncing ? 'animate-spin text-white' : 'text-white'" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                <span x-text="isSyncing ? 'กำลังซิงค์...' : 'ซิงค์ข้อมูล'"></span>
            </button>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="fixed top-[52px] w-full bg-gray-900 z-40 border-b border-gray-700" aria-label="Main Navigation">
        <div class="flex justify-center gap-8 py-2" role="tablist">
            <button id="tab-results" @click="activeTab = 'results'" role="tab" :aria-selected="activeTab === 'results'" 
                    :class="activeTab === 'results' ? 'text-blue-400 border-blue-400' : 'text-gray-400 border-transparent'" 
                    class="pb-1 font-semibold border-b-2 transition focus:outline-none focus:text-blue-300">ผลรางวัลรวม</button>
            <button id="tab-flows" @click="activeTab = 'flows'" role="tab" :aria-selected="activeTab === 'flows'" 
                    :class="activeTab === 'flows' ? 'text-green-400 border-green-400' : 'text-gray-400 border-transparent'" 
                    class="pb-1 font-semibold border-b-2 transition focus:outline-none focus:text-green-300">สถิติเลขไหล</button>
        </div>
    </nav>

    <!-- Main Workspace -->
    <div class="flex pt-[100px] h-screen overflow-hidden">
        
        <!-- Sidebar Navigation -->
        <nav class="w-32 md:w-48 flex-shrink-0 bg-gray-800 border-r border-gray-700 h-full overflow-y-auto no-scrollbar pb-20">
            <ul class="p-2 space-y-1" role="list">
                <template x-for="category in categories" :key="category.id">
                    <li>
                        <button @click="scrollTo(category.id)" 
                                class="w-full text-left px-3 py-2 text-sm rounded hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" 
                                x-text="category.name"></button>
                    </li>
                </template>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto p-4 pb-24 scroll-smooth bg-gray-900" id="main-scroll-area">
            
            <!-- TAB 1: ผลรางวัล -->
            <section id="panel-results" x-show="activeTab === 'results'" role="tabpanel">
                
                <!-- Loading Skeleton -->
                <template x-if="isSyncing && lotteriesData.length === 0">
                    <div class="space-y-6">
                        <div class="h-8 bg-gray-800 rounded w-1/4 animate-pulse"></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            <div class="h-40 bg-gray-800 rounded-lg animate-pulse border border-gray-700"></div>
                            <div class="h-40 bg-gray-800 rounded-lg animate-pulse border border-gray-700"></div>
                            <div class="h-40 bg-gray-800 rounded-lg animate-pulse border border-gray-700"></div>
                        </div>
                    </div>
                </template>

                <template x-if="lotteriesData.length > 0">
                    <div>
                        <template x-for="category in categories" :key="category.id">
                            <div :id="'results-' + category.id" class="mb-8 pt-2" x-show="getLotteriesByCategory(category.id).length > 0">
                                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2 text-blue-300" x-text="category.name"></h2>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                    <template x-for="lotto in getLotteriesByCategory(category.id)" :key="lotto.id">
                                        <article class="bg-gray-800 rounded-lg p-4 border border-gray-700 shadow-sm relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-blue-500 transition hover:bg-gray-750 flex flex-col" tabindex="0">
                                            <time :datetime="lotto.time" class="absolute top-0 right-0 bg-blue-600/80 backdrop-blur-sm text-xs px-2 py-1 rounded-bl-lg font-mono text-white" x-text="lotto.time"></time>
                                            <h3 class="text-md font-semibold text-gray-200 mb-2 truncate pr-12" x-text="lotto.name" :title="lotto.name"></h3>
                                            
                                            <div class="flex justify-between items-center bg-gray-900 p-2 rounded border border-gray-800 mb-3">
                                                <div class="text-center w-1/2 border-r border-gray-700">
                                                    <div class="text-[10px] text-gray-500 uppercase tracking-wider mb-1">เลขดิบ (จำลอง 3 ตัวบน)</div>
                                                    <div class="text-2xl font-bold text-red-400 font-mono tracking-widest" x-text="lotto.top3"></div>
                                                </div>
                                                <div class="text-center w-1/2">
                                                    <div class="text-[10px] text-gray-500 uppercase tracking-wider mb-1">ความเสี่ยง (Risk)</div>
                                                    <div class="text-lg font-bold font-mono tracking-widest uppercase" 
                                                         :class="{'text-red-500': lotto.bottom2 === 'CR', 'text-yellow-500': lotto.bottom2 === 'HI', 'text-blue-400': lotto.bottom2 === 'ST'}"
                                                         x-text="lotto.bottom2"></div>
                                                </div>
                                            </div>

                                            <div class="mt-auto flex justify-between items-center text-xs text-gray-400 border-t border-gray-700 pt-2">
                                                <span class="flex items-center gap-1">
                                                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                                    ไหล: <span class="text-green-400 font-bold" x-text="lotto.flow_today.join(',')"></span>
                                                </span>
                                                
                                                <!-- AI ANALYSIS BUTTON -->
                                                <button @click="analyzeLottoWithAI(lotto)" 
                                                        class="flex items-center gap-1 bg-gray-900 hover:bg-gray-700 text-purple-400 border border-purple-500/50 hover:border-purple-400 px-2 py-1 rounded transition duration-200 focus:outline-none focus:ring-1 focus:ring-purple-400">
                                                    <span>วิเคราะห์ ✨</span>
                                                </button>
                                            </div>
                                        </article>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </section>

            <!-- TAB 2: เลขไหลแบบละเอียด -->
            <section id="panel-flows" x-show="activeTab === 'flows'" role="tabpanel" style="display: none;">
                <template x-for="category in categories" :key="category.id">
                    <div :id="'flows-' + category.id" class="mb-8 pt-2" x-show="getLotteriesByCategory(category.id).length > 0">
                        <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2 text-green-300" x-text="category.name"></h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <template x-for="lotto in getLotteriesByCategory(category.id)" :key="'flow-'+lotto.id">
                                <div class="bg-gray-800 rounded-lg p-3 border border-gray-700 flex flex-col gap-2 relative">
                                    <div class="flex items-center justify-between">
                                        <span class="font-semibold text-gray-200" x-text="lotto.name"></span>
                                        <button @click="analyzeLottoWithAI(lotto)" class="text-[10px] bg-purple-900/50 hover:bg-purple-800 text-purple-300 border border-purple-700 px-2 py-0.5 rounded transition">
                                            เจาะลึกด้วย AI ✨
                                        </button>
                                    </div>
                                    <div class="flex gap-2 w-full justify-between mt-1">
                                        <div class="bg-gray-900 px-2 py-1 rounded border border-gray-700 text-center flex-1">
                                            <div class="text-[9px] text-gray-500">ล่าสุด</div>
                                            <div class="text-sm font-bold text-green-400" x-text="lotto.flow_today.join('-')"></div>
                                        </div>
                                        <div class="bg-gray-900 px-2 py-1 rounded border border-gray-700 text-center flex-1">
                                            <div class="text-[9px] text-gray-500">อดีต</div>
                                            <div class="text-sm font-bold text-blue-400" x-text="lotto.flow_history.join('-')"></div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </section>

        </main>
    </div>

    <!-- AI Modal Overlay -->
    <div x-show="aiModal.show" style="display: none;"
         class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
        
        <div class="bg-gray-800 border border-purple-500/50 shadow-2xl rounded-xl max-w-md w-full overflow-hidden flex flex-col"
             @click.outside="closeAIModal()">
            <!-- Modal Header -->
            <div class="bg-gradient-to-r from-gray-900 to-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
                <h3 class="text-lg font-bold text-purple-400 flex items-center gap-2">
                    <span class="animate-pulse">✨</span> 
                    <span x-text="aiModal.title">The Axiom Oracle</span>
                </h3>
                <button @click="closeAIModal()" class="text-gray-400 hover:text-white transition focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- Modal Body -->
            <div class="p-5 min-h-[120px] max-h-[60vh] overflow-y-auto bg-gray-900 relative">
                <!-- Loading State -->
                <div x-show="aiModal.loading" class="flex flex-col items-center justify-center h-full space-y-3 py-6">
                    <div class="w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full animate-spin ai-glow"></div>
                    <p class="text-sm text-purple-300 animate-pulse">กำลังประมวลผลดวงดาวและเส้นสายสถิติ...</p>
                </div>
                
                <!-- Content State -->
                <div x-show="!aiModal.loading" class="text-gray-200 text-sm leading-relaxed whitespace-pre-wrap" x-text="aiModal.content">
                </div>
            </div>
            
            <!-- Modal Footer -->
            <div class="bg-gray-800 p-3 border-t border-gray-700 flex justify-end">
                <button @click="closeAIModal()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-gray-500">
                    ปิดหน้าต่าง
                </button>
            </div>
        </div>
    </div>

    <!-- Core Application Logic -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('avalonApp', () => ({
                activeTab: 'results',
                countdown: 60,
                isSyncing: false,
                lastSyncTime: '--:--',
                notification: { show: false, message: '', type: 'success' },
                
                // AI State
                aiModal: {
                    show: false,
                    title: 'วิเคราะห์แนวโน้ม',
                    content: '',
                    loading: false
                },
                
                // THE AXIOM CONFIGURATION PATCH
                CONFIG: {
                    TOKEN: 'AXIOM_SECURE_TOKEN_V3_2026',
                    PRIMARY_API: 'http://127.0.0.1:8000/api/v1/dashboard', 
                    FALLBACK_API: 'https://script.google.com/macros/s/YOUR_DEPLOY_ID/exec'
                },

                categories: [
                    { id: 'cat-normal', name: 'หวยหุ้นปกติ' },
                    { id: 'cat-hanoi', name: 'หวยรายวัน ฮานอย' },
                    { id: 'cat-laos', name: 'หวยรายวัน ลาว' },
                    { id: 'cat-vip', name: 'หวยหุ้นวีไอพี' },
                    { id: 'cat-special', name: 'หวยหุ้นพิเศษ' },
                    { id: 'cat-visa', name: 'หวยหุ้นวีซ่า' },
                    { id: 'cat-others', name: 'หวยอื่นๆ' }
                ],
                lotteriesData: [],
                
                init() {
                    this.updateLastSyncTime();
                    this.syncData(); 
                    
                    setInterval(() => {
                        if(this.countdown > 0 && !this.isSyncing && !this.aiModal.show) {
                            this.countdown--;
                        } else if (this.countdown === 0 && !this.isSyncing && !this.aiModal.show) {
                            this.syncData();
                        }
                    }, 1000);
                },

                getLotteriesByCategory(catId) {
                    return this.lotteriesData.filter(l => l.categoryId === catId);
                },

                updateLastSyncTime() {
                    const now = new Date();
                    this.lastSyncTime = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                },

                showToast(message, type = 'success') {
                    this.notification.message = message;
                    this.notification.type = type;
                    this.notification.show = true;
                    setTimeout(() => { this.notification.show = false; }, 3500);
                },

                async syncData() {
                    if (this.isSyncing) return;
                    this.isSyncing = true;
                    
                    try {
                        let incomingData = null;
                        let useMockData = false;
                        
                        try {
                            const controller = new AbortController();
                            const timeoutId = setTimeout(() => controller.abort(), 5000); 
                            
                            // ทดสอบจับ Error ล่วงหน้าไม่ให้หลุดออกไปที่ Console
                            const primaryResponse = await fetch(this.CONFIG.PRIMARY_API, {
                                method: 'GET',
                                headers: { 'x-token': this.CONFIG.TOKEN }, 
                                signal: controller.signal
                            }).catch(() => null); 
                            
                            clearTimeout(timeoutId);
                            
                            if (primaryResponse && primaryResponse.ok) {
                                incomingData = await primaryResponse.json();
                                this.showToast("เชื่อมต่อแกนกลางมหาภพ AXIOM สำเร็จ", "success");
                            } else {
                                throw new Error("Primary API Offline");
                            }
                        } catch (primaryErr) {
                            console.warn("THE AXIOM: Local Node Offline/Timeout. Engaging Fallback...");
                            
                            try {
                                const fallbackUrl = `${this.CONFIG.FALLBACK_API}?token=${this.CONFIG.TOKEN}`;
                                const fallbackResponse = await fetch(fallbackUrl).catch(() => null);
                                
                                if (fallbackResponse && fallbackResponse.ok) {
                                    incomingData = await fallbackResponse.json();
                                    if (incomingData.error) throw new Error(incomingData.error);
                                    this.showToast("อัปเดตจากระบบสำรองสำเร็จ", "success");
                                } else {
                                    throw new Error("Fallback API Offline");
                                }
                            } catch (fallbackErr) {
                                console.warn("THE AXIOM: All APIs Offline. Switching to Mock Data mode.");
                                useMockData = true;
                            }
                        }

                        // หากหาเซิร์ฟเวอร์ไม่ได้เลย ให้ใช้โหมดข้อมูลจำลองเพื่อป้องกัน Error และทดสอบ UI ได้
                        if (useMockData) {
                            this.showToast("ออฟไลน์: กำลังใช้ข้อมูลจำลอง (Mock Data)", "warning");
                            incomingData = {
                                lotteries: [
                                    { id: 'dji', categoryId: 'cat-normal', time: '03:20', name: 'ดาวโจนส์', top3: '456', bottom2: 'HI', flow_today: ['12', '34', '56'], flow_history: ['78', '90'] },
                                    { id: 'goverment', categoryId: 'cat-others', time: '16:00', name: 'รัฐบาลไทย', top3: '999', bottom2: 'CR', flow_today: ['11', '22', '33'], flow_history: ['44', '55'] },
                                    { id: 'laosdevelops', categoryId: 'cat-laos', time: '20:30', name: 'ลาวพัฒนา', top3: '123', bottom2: 'ST', flow_today: ['01', '02', '03'], flow_history: ['04', '05'] },
                                    { id: 'hanoivisa', categoryId: 'cat-visa', time: '18:30', name: 'ฮานอยวีซ่า', top3: '777', bottom2: 'HI', flow_today: ['99', '88', '77'], flow_history: ['66', '55'] },
                                    { id: 'nikkei', categoryId: 'cat-normal', time: '13:00', name: 'นิเคอิ บ่าย', top3: '888', bottom2: 'ST', flow_today: ['10', '20', '30'], flow_history: ['40', '50'] },
                                    { id: 'magnum', categoryId: 'cat-others', time: '18:00', name: 'มาเลย์ Magnum', top3: '555', bottom2: 'CR', flow_today: ['00', '11', '22'], flow_history: ['33', '44'] }
                                ]
                            };
                        }

                        if (!incomingData || !Array.isArray(incomingData.lotteries)) {
                            throw new Error('โครงสร้างข้อมูลขัดข้อง (Schema Mismatch)');
                        }
                        
                        this.lotteriesData = incomingData.lotteries;
                        this.updateLastSyncTime();

                    } catch (error) {
                        console.error("THE AXIOM: SYNC ERROR -", error.message);
                        this.showToast(`การซิงค์ขัดข้อง: ${error.message}`, "error");
                    } finally {
                        this.isSyncing = false;
                        this.countdown = 60;
                    }
                },

                scrollTo(id) {
                    const prefix = this.activeTab === 'results' ? 'results-' : 'flows-';
                    const element = document.getElementById(prefix + id);
                    const container = document.getElementById('main-scroll-area');
                    if (element && container) {
                        container.scrollTo({ top: element.offsetTop - 120, behavior: 'smooth' });
                    }
                },

                // --- GEMINI API INTEGRATION (THE AXIOM ORACLE) ---
                closeAIModal() {
                    this.aiModal.show = false;
                    if(this.countdown < 5) this.countdown = 5; 
                },

                async fetchGeminiWithRetry(prompt) {
                    const apiKey = ""; // API Key injects at runtime
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { 
                            parts: [{ 
                                text: "คุณคือ 'Axiom Oracle' ผู้เชี่ยวชาญด้านการวิเคราะห์สถิติตัวเลข หวย และหุ้น ตอบกลับด้วยภาษาไทยที่เป็นมืออาชีพ น่าตื่นเต้น และเข้าใจง่าย ให้คำแนะนำว่าแนวโน้มสถิตินี้เป็นอย่างไร ผันผวนหรือไม่ หรือมีโอกาสไปในทิศทางไหน (ห้ามยืนยันผล 100% ให้ใช้คำว่า มีโอกาส หรือ มีแนวโน้ม) ตอบให้สั้น กระชับ ไม่เกิน 3-4 ประโยค" 
                            }] 
                        }
                    };

                    const delays = [1000, 2000, 4000, 8000, 16000];
                    
                    for (let i = 0; i < delays.length + 1; i++) {
                        try {
                            const response = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            
                            if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                            
                            const data = await response.json();
                            return data.candidates?.[0]?.content?.parts?.[0]?.text || "ดวงดาวสับสน ไม่สามารถดึงคำทำนายได้ในขณะนี้";
                        } catch (err) {
                            console.warn(`[Axiom Oracle] Retrying connection (Attempt ${i + 1})...`);
                            if (i === delays.length) throw err;
                            await new Promise(res => setTimeout(res, delays[i]));
                        }
                    }
                },

                async analyzeLottoWithAI(lotto) {
                    this.aiModal.title = lotto.name;
                    this.aiModal.content = '';
                    this.aiModal.loading = true;
                    this.aiModal.show = true;

                    const prompt = `
                        ช่วยวิเคราะห์แนวโน้มชุดข้อมูลของ "${lotto.name}" ในวันนี้หน่อยครับ:
                        - ดัชนี/เลขจำลอง: ${lotto.top3}
                        - ระดับความเสี่ยง (Z-Score ประเมิน): ${lotto.bottom2}
                        - เลขไหล (Flow) วันนี้: ${lotto.flow_today.join(', ') || 'ไม่มีข้อมูล'}
                        - เลขไหล (Flow) อดีตย้อนหลัง: ${lotto.flow_history.join(', ') || 'ไม่มีข้อมูล'}
                        
                        สถิตินี้บอกอะไรเราบ้าง? ทิศทางน่าจะไปทางไหน? ช่วยวิเคราะห์สั้นๆ กระชับๆ ครับ
                    `;

                    try {
                        const result = await this.fetchGeminiWithRetry(prompt);
                        this.aiModal.content = result;
                    } catch (error) {
                        console.error("Gemini API Error:", error);
                        this.aiModal.content = "ขออภัย เกิดสัญญาณแทรกซ้อนจากการเชื่อมต่อ AI (API Error) โปรดลองใหม่อีกครั้งในภายหลัง";
                    } finally {
                        this.aiModal.loading = false;
                    }
                }
            }));
        });
    </script>
