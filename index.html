<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Avalon Hub - ระบบบัญชาการสถิติและผลรางวัลระดับองค์กร">
    <meta name="theme-color" content="#111827">
    <title>Avalon Hub - Master Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-enter { opacity: 0; transform: translate(-50%, -1rem); }
        .toast-enter-active { transition: all 0.3s ease-out; }
        .toast-leave-active { transition: all 0.2s ease-in; opacity: 0; transform: translate(-50%, -1rem); }
        .ai-glow { animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow {
            from { box-shadow: 0 0 5px #3b82f6, 0 0 10px #3b82f6; }
            to { box-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6; }
        }
        .pending-pulse { animation: pulse-opacity 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-opacity {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased overflow-hidden" 
      x-data="avalonApp()" 
      @keydown.ctrl.r.prevent="!isSyncing && syncData()"
      @keydown.meta.r.prevent="!isSyncing && syncData()">

    <div x-show="notification.show" 
         x-transition:enter="toast-enter-active" x-transition:enter-start="toast-enter"
         x-transition:leave="toast-leave-active" x-transition:leave-end="toast-enter"
         class="fixed top-16 left-1/2 transform -translate-x-1/2 z-[60] px-4 py-2 rounded shadow-lg font-semibold flex items-center gap-2 border border-gray-700"
         :class="notification.type === 'error' ? 'bg-red-900 text-red-100' : (notification.type === 'warning' ? 'bg-yellow-600 text-white' : 'bg-green-800 text-green-100')"
         role="alert" aria-live="assertive">
         <span x-text="notification.message"></span>
    </div>

    <header class="fixed top-0 w-full bg-gray-800 shadow-md z-50 flex justify-between items-center px-4 py-3 border-b border-gray-700 overflow-x-auto no-scrollbar">
        <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 focus:outline-none flex-shrink-0 mr-4" tabindex="0">AVALON HUB</h1>
        
        <div class="flex items-center gap-2 sm:gap-3 text-sm flex-nowrap min-w-max">
            <div class="hidden xl:block text-gray-500 mr-2" aria-label="เวลาอัปเดตล่าสุด">
                อัปเดต: <span x-text="lastSyncTime" class="font-mono text-gray-300"></span>
            </div>
            
            <button @click="!isSyncing && forceMineData()" :disabled="isSyncing" aria-label="บังคับดึงข้อมูล" 
                    class="bg-orange-600/80 hover:bg-orange-500 border border-orange-400 disabled:bg-gray-800 disabled:text-gray-500 text-white px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-orange-300">
                <span class="hidden md:inline">บังคับดึงข้อมูล</span> ⚡
            </button>

            <button @click="!isSyncing && analyzeFrequency()" :disabled="isSyncing || lotteriesData.length === 0" aria-label="สแกนความถี่ตัวเลข" 
                    class="bg-indigo-900/60 hover:bg-indigo-800 border border-indigo-500/50 disabled:bg-gray-800 disabled:border-gray-700 disabled:text-gray-500 text-indigo-300 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-indigo-400">
                <span class="hidden md:inline">สแกนความถี่</span> 🔍
            </button>

            <button @click="!isSyncing && analyzeLuckyPicks()" :disabled="isSyncing || lotteriesData.length === 0" aria-label="เก็งเลขเด็ด" 
                    class="bg-red-900/60 hover:bg-red-800 border border-red-500/50 disabled:bg-gray-800 disabled:border-gray-700 disabled:text-gray-500 text-red-300 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-red-400">
                <span class="hidden md:inline">เก็งเทรนด์เลข</span> 🎯
            </button>

            <button @click="!isSyncing && analyzeMarketSummary()" :disabled="isSyncing || lotteriesData.length === 0" aria-label="วิเคราะห์ภาพรวมตลาด" 
                    class="bg-purple-900/60 hover:bg-purple-800 border border-purple-500/50 disabled:bg-gray-800 disabled:border-gray-700 disabled:text-gray-500 text-purple-300 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-purple-400">
                <span class="hidden sm:inline">สรุปตลาด</span> ✨
            </button>

            <button @click="!isSyncing && syncData()" :disabled="isSyncing" aria-label="ซิงค์ข้อมูลผลรางวัล" 
                    class="bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-white">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" :class="isSyncing ? 'animate-spin text-white' : 'text-white'" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                <span x-text="isSyncing ? 'ซิงค์...' : 'อัปเดต'" class="hidden sm:inline"></span>
            </button>
        </div>
    </header>

    <nav class="fixed top-[52px] w-full bg-gray-900 z-40 border-b border-gray-700" aria-label="Main Navigation">
        <div class="flex justify-center gap-8 py-2" role="tablist">
            <button id="tab-results" @click="activeTab = 'results'" role="tab" :aria-selected="activeTab === 'results'" 
                    :class="activeTab === 'results' ? 'text-blue-400 border-blue-400' : 'text-gray-400 border-transparent'" 
                    class="pb-1 font-semibold border-b-2 transition focus:outline-none focus:text-blue-300">ผลรางวัลแบ่งกลุ่ม</button>
            <button id="tab-timeline" @click="activeTab = 'timeline'" role="tab" :aria-selected="activeTab === 'timeline'" 
                    :class="activeTab === 'timeline' ? 'text-yellow-400 border-yellow-400' : 'text-gray-400 border-transparent'" 
                    class="pb-1 font-semibold border-b-2 transition focus:outline-none focus:text-yellow-300">กระดานเวลา ⏳</button>
            <button id="tab-flows" @click="activeTab = 'flows'" role="tab" :aria-selected="activeTab === 'flows'" 
                    :class="activeTab === 'flows' ? 'text-green-400 border-green-400' : 'text-gray-400 border-transparent'" 
                    class="pb-1 font-semibold border-b-2 transition focus:outline-none focus:text-green-300">สถิติเลขไหล</button>
        </div>
    </nav>

    <div class="flex pt-[100px] h-screen overflow-hidden">
        <nav x-show="activeTab !== 'timeline'" class="w-32 md:w-48 flex-shrink-0 bg-gray-800 border-r border-gray-700 h-full overflow-y-auto no-scrollbar pb-20">
            <ul class="p-2 space-y-1" role="list">
                <template x-for="category in categories" :key="category.id">
                    <li>
                        <button @click="scrollTo(category.id)" 
                                class="w-full text-left px-3 py-2 text-sm rounded hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition truncate" 
                                x-text="category.name" :title="category.name"></button>
                    </li>
                </template>
            </ul>
        </nav>

        <main class="flex-1 overflow-y-auto p-4 pb-24 scroll-smooth bg-gray-900" id="main-scroll-area">
            
            <section id="panel-results" x-show="activeTab === 'results'" role="tabpanel">
                <template x-if="lotteriesData.length > 0">
                    <div>
                        <template x-for="category in categories" :key="category.id">
                            <div :id="'results-' + category.id" class="mb-10 pt-2" x-show="getLotteriesByCategory(category.id).length > 0">
                                <h2 class="text-xl font-bold mb-4 text-blue-300" x-text="category.name"></h2>
                                <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700 shadow-lg">
                                    <div class="bg-[#8b0000] text-white flex items-center px-4 py-2 font-bold text-sm md:text-base border-b border-red-900">
                                        <div class="flex-1">รายการหวย</div>
                                        <div class="w-20 md:w-32 text-center">3 ตัวบน</div>
                                        <div class="w-20 md:w-32 text-center">2 ตัวล่าง</div>
                                        <div class="w-16 text-center">สถานะ</div> 
                                    </div>
                                    <div class="divide-y divide-gray-700">
                                        <template x-for="lotto in getLotteriesByCategory(category.id)" :key="lotto.id">
                                            <div class="flex items-center px-4 py-3 transition group bg-gray-800 even:bg-gray-800/50"
                                                 :class="lotto.risk === 'WAIT' ? 'opacity-80' : 'hover:bg-gray-750'">
                                                <div class="flex-1 flex items-center gap-2 md:gap-3 min-w-0">
                                                    <span class="text-lg md:text-xl drop-shadow-md" x-text="getFlag(lotto.name)"></span>
                                                    <span class="font-semibold text-gray-200 text-sm md:text-base truncate" x-text="lotto.name" :title="lotto.name"></span>
                                                    <span class="bg-gray-900 text-gray-400 text-[10px] md:text-xs px-2 py-0.5 rounded-full font-mono border border-gray-700 shadow-inner flex-shrink-0" x-text="lotto.time"></span>
                                                </div>
                                                <div class="w-20 md:w-32 text-center">
                                                    <span class="font-bold text-lg md:text-xl font-mono tracking-wider" 
                                                          :class="lotto.top3 === '***' ? 'text-gray-600 pending-pulse' : 'text-red-400'" 
                                                          x-text="lotto.top3"></span>
                                                </div>
                                                <div class="w-20 md:w-32 text-center">
                                                    <span class="font-bold text-lg md:text-xl font-mono tracking-wider" 
                                                          :class="lotto.bottom2 === '**' ? 'text-gray-600 pending-pulse' : 'text-blue-400'" 
                                                          x-text="lotto.bottom2"></span>
                                                </div>
                                                <div class="w-16 text-right flex justify-end items-center gap-2">
                                                    <template x-if="lotto.risk !== 'WAIT'">
                                                        <button @click="analyzeLottoWithAI(lotto, 'result')" 
                                                                class="text-purple-400 hover:text-purple-300 bg-purple-900/30 hover:bg-purple-900/50 p-1.5 rounded transition opacity-70 group-hover:opacity-100 focus:outline-none">✨</button>
                                                    </template>
                                                    <template x-if="lotto.risk === 'WAIT'">
                                                        <span class="text-gray-600 text-xs flex items-center justify-center w-full"><svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></span>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </section>

            <section id="panel-timeline" x-show="activeTab === 'timeline'" role="tabpanel" style="display: none;">
                <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700 shadow-lg mb-8">
                    <div class="bg-gradient-to-r from-yellow-900 to-yellow-800 text-white flex items-center px-4 py-3 font-bold text-sm md:text-base border-b border-yellow-700">
                        <div class="flex-1">เวลา / รายการ</div>
                        <div class="w-20 md:w-32 text-center">3 ตัวบน</div>
                        <div class="w-20 md:w-32 text-center">2 ตัวล่าง</div>
                        <div class="w-10 text-center"></div> 
                    </div>
                    <div class="divide-y divide-gray-700">
                        <template x-for="lotto in getAllLotteriesSortedByTime()" :key="'tl-'+lotto.id">
                            <div class="flex items-center px-4 py-2.5 transition group bg-gray-800 even:bg-gray-800/50 hover:bg-gray-750" :class="lotto.risk === 'WAIT' ? 'opacity-70' : ''">
                                <div class="flex-1 flex items-center gap-2 md:gap-3 min-w-0">
                                    <span class="bg-yellow-900/50 text-yellow-400 text-[10px] md:text-xs px-2 py-1 rounded font-mono border border-yellow-700/50 flex-shrink-0" x-text="lotto.time"></span>
                                    <span class="text-lg md:text-xl drop-shadow-md" x-text="getFlag(lotto.name)"></span>
                                    <span class="font-semibold text-gray-200 text-sm md:text-base truncate" x-text="lotto.name" :title="lotto.name"></span>
                                    <span class="hidden lg:inline-block text-[9px] px-1.5 py-0.5 bg-gray-700 text-gray-400 rounded-full border border-gray-600 truncate max-w-[80px]" x-text="getCategoryName(lotto.categoryId).replace(' (เรียงตามเวลา)','')"></span>
                                </div>
                                <div class="w-20 md:w-32 text-center">
                                    <span class="font-bold text-lg md:text-xl font-mono tracking-wider" :class="lotto.top3 === '***' ? 'text-gray-600' : 'text-red-400'" x-text="lotto.top3"></span>
                                </div>
                                <div class="w-20 md:w-32 text-center">
                                    <span class="font-bold text-lg md:text-xl font-mono tracking-wider" :class="lotto.bottom2 === '**' ? 'text-gray-600' : 'text-blue-400'" x-text="lotto.bottom2"></span>
                                </div>
                                <div class="w-10 text-right">
                                    <template x-if="lotto.risk !== 'WAIT'">
                                        <button @click="analyzeLottoWithAI(lotto, 'result')" class="text-purple-400 hover:text-purple-300 opacity-50 group-hover:opacity-100">✨</button>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>

            <section id="panel-flows" x-show="activeTab === 'flows'" role="tabpanel" style="display: none;">
                <template x-for="category in categories" :key="category.id">
                    <div :id="'flows-' + category.id" class="mb-8 pt-2" x-show="getLotteriesByCategory(category.id).filter(l => l.risk !== 'WAIT').length > 0">
                        <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2 text-green-300" x-text="category.name"></h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <template x-for="lotto in getLotteriesByCategory(category.id).filter(l => l.risk !== 'WAIT')" :key="'flow-'+lotto.id">
                                <div class="bg-gray-800 rounded-lg p-3 border border-gray-700 flex flex-col gap-2 relative">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center gap-2"><span x-text="getFlag(lotto.name)"></span><span class="font-semibold text-gray-200" x-text="lotto.name"></span></div>
                                        <button @click="analyzeLottoWithAI(lotto, 'flow')" class="text-[10px] bg-purple-900/50 text-purple-300 border border-purple-700 px-2 py-0.5 rounded">เจาะลึก 🔮</button>
                                    </div>
                                    <div class="flex gap-2 w-full justify-between mt-1">
                                        <div class="bg-gray-900 px-2 py-1 rounded border border-gray-700 text-center flex-1">
                                            <div class="text-[9px] text-gray-500">ล่าสุด</div>
                                            <div class="text-sm font-bold text-green-400" x-text="lotto.flow_today.join('-') || '-'"></div>
                                        </div>
                                        <div class="bg-gray-900 px-2 py-1 rounded border border-gray-700 text-center flex-1">
                                            <div class="text-[9px] text-gray-500">อดีต</div>
                                            <div class="text-sm font-bold text-blue-400" x-text="lotto.flow_history.join('-') || '-'"></div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </section>
        </main>
    </div>

    <div x-show="aiModal.show" style="display: none;" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
        <div class="bg-gray-800 border border-purple-500/50 shadow-2xl rounded-xl max-w-md w-full overflow-hidden flex flex-col" @click.outside="closeAIModal()">
            <div class="bg-gradient-to-r from-gray-900 to-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
                <h3 class="text-lg font-bold text-purple-400 flex items-center gap-2">
                    <span class="animate-pulse" x-text="getModalIcon()"></span> 
                    <span x-text="aiModal.title">The Axiom Oracle</span>
                </h3>
                <button @click="closeAIModal()" class="text-gray-400 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-5 min-h-[150px] max-h-[60vh] overflow-y-auto bg-gray-900 relative">
                <div x-show="aiModal.loading" class="flex flex-col items-center justify-center h-full space-y-3 py-6"><div class="w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div><p class="text-sm text-purple-300">กำลังวิเคราะห์สถิติมหาภพ...</p></div>
                <div x-show="!aiModal.loading" class="text-gray-200 text-sm leading-relaxed whitespace-pre-wrap" x-text="aiModal.content"></div>
            </div>
            <div class="bg-gray-800 p-3 border-t border-gray-700 flex justify-between items-center">
                <button @click="playAIAudio()" :disabled="aiModal.loading || !aiModal.content || aiModal.audioLoading" class="px-3 py-1.5 bg-indigo-900/50 text-indigo-300 border border-indigo-700 rounded text-sm font-semibold transition flex items-center gap-2">
                    <template x-if="!aiModal.audioLoading"><span>🔊</span></template>
                    <span x-text="aiModal.audioLoading ? 'กำลังสร้างเสียง...' : 'ฟังเสียง'"></span>
                </button>
                <button @click="closeAIModal()" class="px-4 py-2 bg-gray-700 text-white rounded text-sm font-semibold">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            const MASTER_CATALOG = [
                { name: 'หุ้นดาวโจนส์', time: '03:30', categoryId: 'cat-normal' }, { name: 'หุ้นนิคเคอิเช้า', time: '09:30', categoryId: 'cat-normal' }, { name: 'หุ้นจีนเช้า', time: '10:30', categoryId: 'cat-normal' }, { name: 'หุ้นฮั่งเส็งเช้า', time: '11:00', categoryId: 'cat-normal' }, { name: 'หุ้นไต้หวัน', time: '12:30', categoryId: 'cat-normal' }, { name: 'หุ้นนิคเคอิบ่าย', time: '13:00', categoryId: 'cat-normal' }, { name: 'หุ้นเกาหลี', time: '13:35', categoryId: 'cat-normal' }, { name: 'หุ้นจีนบ่าย', time: '14:00', categoryId: 'cat-normal' }, { name: 'หุ้นฮั่งเส็งบ่าย', time: '15:00', categoryId: 'cat-normal' }, { name: 'หุ้นสิงคโปร์', time: '16:40', categoryId: 'cat-normal' }, { name: 'หุ้นไทยเย็น', time: '16:40', categoryId: 'cat-normal' }, { name: 'หุ้นอินเดีย', time: '17:30', categoryId: 'cat-normal' }, { name: 'หุ้นอียิปต์', time: '20:00', categoryId: 'cat-normal' }, { name: 'หุ้นรัสเซีย', time: '23:00', categoryId: 'cat-normal' }, { name: 'หุ้นเยอรมัน', time: '23:10', categoryId: 'cat-normal' }, { name: 'หุ้นอังกฤษ', time: '23:10', categoryId: 'cat-normal' },
                { name: 'ฮานอยเช้า', time: '08:30', categoryId: 'cat-hanoi' }, { name: 'ฮานอยปกติ', time: '18:30', categoryId: 'cat-hanoi' }, { name: 'ฮานอย VIP', time: '19:30', categoryId: 'cat-hanoi' },
                { name: 'ลาวประตูชัย', time: '05:45', categoryId: 'cat-laos' }, { name: 'ลาวพัฒนา', time: '20:30', categoryId: 'cat-laos' }, { name: 'ลาว VIP', time: '21:30', categoryId: 'cat-laos' },
                { name: 'รัฐบาลไทย', time: '16:00', categoryId: 'cat-others' }, { name: 'มาเลย์', time: '18:00', categoryId: 'cat-others' }, { name: 'แม่โขง VIP', time: '19:45', categoryId: 'cat-others' }
                // ... (รายการอื่นๆ อีก 100+ รายการที่คุณมีอยู่)
            ];

            Alpine.data('avalonApp', () => ({
                activeTab: 'results', countdown: 60, isSyncing: false, lastSyncTime: '--:--', notification: { show: false, message: '', type: 'success' },
                aiModal: { show: false, title: '', content: '', loading: false, audioLoading: false, mode: 'result' },
                lotteriesData: [],
                CONFIG: {
                    TOKEN: 'AXIOM_SECURE_TOKEN_V3_2026',
                    PRIMARY_API: 'http://127.0.0.1:8000/api/v1/dashboard'
                },
                categories: [
                    { id: 'cat-normal', name: 'หุ้นปกติ (เรียงตามเวลา)' }, { id: 'cat-vip', name: 'หวยหุ้นวีไอพี' }, { id: 'cat-special', name: 'หวยหุ้นพิเศษ' },
                    { id: 'cat-hanoi', name: 'หวยรายวัน ฮานอย' }, { id: 'cat-laos', name: 'หวยรายวัน ลาว' }, { id: 'cat-visa', name: 'หวยหุ้นวีซ่า' }, { id: 'cat-others', name: 'หวยอื่นๆ' }
                ],
                init() { this.syncData(); setInterval(() => { if(this.countdown > 0 && !this.isSyncing && !this.aiModal.show) this.countdown--; else if (this.countdown === 0) this.syncData(); }, 1000); },
                getLotteriesByCategory(catId) { return this.lotteriesData.filter(l => l.categoryId === catId).sort((a, b) => a.time.localeCompare(b.time)); },
                getCategoryName(catId) { const cat = this.categories.find(c => c.id === catId); return cat ? cat.name : ''; },
                getAllLotteriesSortedByTime() { return [...this.lotteriesData].sort((a, b) => a.time.localeCompare(b.time)); },
                getModalIcon() { const icons = { summary: '🌍', lucky: '🎯', scan: '🔍', flow: '🔮', result: '✨' }; return icons[this.aiModal.mode] || '✨'; },
                updateLastSyncTime() { this.lastSyncTime = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); },
                showToast(message, type = 'success') { this.notification = { show: true, message, type }; setTimeout(() => this.notification.show = false, 3500); },
                getFlag(name) {
                    const n = name.toLowerCase();
                    if (n.includes('ดาวโจนส์')) return '🇺🇸'; if (n.includes('นิเคอิ')) return '🇯🇵'; if (n.includes('จีน')) return '🇨🇳'; if (n.includes('ฮั่งเส็ง')) return '🇭🇰'; if (n.includes('ไทย')) return '🇹🇭'; if (n.includes('ลาว')) return '🇱🇦'; if (n.includes('ฮานอย')) return '🇻🇳'; if (n.includes('มาเลย์')) return '🇲🇾';
                    return '🌐';
                },

                async syncData() {
                    this.isSyncing = true;
                    try {
                        const response = await fetch(this.CONFIG.PRIMARY_API, { headers: { 'x-token': this.CONFIG.TOKEN } });
                        if (response.ok) {
                            const incoming = await response.json();
                            this.lotteriesData = incoming.lotteries;
                            this.updateLastSyncTime();
                            this.showToast("อัปเดตแกนกลางมหาภพสำเร็จ", "success");
                        }
                    } catch (e) { this.showToast("เชื่อมต่อ API ไม่สำเร็จ", "error"); }
                    finally { this.isSyncing = false; this.countdown = 60; }
                },

                // THE AXIOM: ฟังก์ชันส่งคำสั่ง Force Mine (Integrated)
                async forceMineData() {
                    this.showToast("⚡ สั่งการรบ: กำลังบังคับดึงข้อมูล โปรดดูหน้าจอ Terminal!", "warning");
                    try {
                        const response = await fetch(this.CONFIG.PRIMARY_API.replace('/dashboard', '/force-mine'), {
                            method: 'POST', headers: { 'x-token': this.CONFIG.TOKEN }
                        });
                        if (response.ok) {
                            setTimeout(() => { this.syncData(); this.showToast("✅ อัปเดตข้อมูลสำเร็จ", "success"); }, 10000);
                        }
                    } catch (e) { this.showToast("คำสั่งล้มเหลว", "error"); }
                },

                async fetchGeminiWithRetry(prompt) {
                    const apiKey = ""; // API KEY GOES HERE
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "คุณคือ 'Axiom Oracle' ผู้เชี่ยวชาญด้านสถิติ ตอบสั้น กระชับ ไม่เกิน 4 ประโยค" }] } };
                    try {
                        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                        const data = await res.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "ดวงดาวสับสน...";
                    } catch (e) { return "สัญญาณแทรกซ้อน..."; }
                },

                async analyzeLottoWithAI(lotto, mode) {
                    this.aiModal = { show: true, title: lotto.name, content: '', loading: true, mode };
                    const prompt = mode === 'flow' ? `วิเคราะห์เลขไหล ${lotto.name}: ${lotto.flow_today.join('-')}` : `วิเคราะห์ผล ${lotto.name}: ${lotto.top3}, ${lotto.bottom2}`;
                    this.aiModal.content = await this.fetchGeminiWithRetry(prompt);
                    this.aiModal.loading = false;
                },

                async analyzeMarketSummary() {
                    this.aiModal = { show: true, title: 'สรุปตลาด', content: '', loading: true, mode: 'summary' };
                    const summary = this.lotteriesData.filter(l => l.risk !== 'WAIT').map(l => `${l.name}:${l.top3}`).join('|');
                    this.aiModal.content = await this.fetchGeminiWithRetry(`สรุปภาพรวมตลาดวันนี้: ${summary}`);
                    this.aiModal.loading = false;
                },

                async analyzeFrequency() {
                    this.aiModal = { show: true, title: 'สแกนความถี่', content: '', loading: true, mode: 'scan' };
                    const nums = this.lotteriesData.filter(l => l.risk !== 'WAIT').map(l => `${l.top3},${l.bottom2}`).join(',');
                    this.aiModal.content = await this.fetchGeminiWithRetry(`สแกนหาเลขแข็ง/เลขอ่อนจากชุดเลขนี้: ${nums}`);
                    this.aiModal.loading = false;
                },

                async analyzeLuckyPicks() {
                    this.aiModal = { show: true, title: 'เก็งเทรนด์เลข', content: '', loading: true, mode: 'lucky' };
                    const prompt = "เก็งเลขนำโชค 3 ชุดจากสถิติตลาดวันนี้";
                    this.aiModal.content = await this.fetchGeminiWithRetry(prompt);
                    this.aiModal.loading = false;
                },

                async playAIAudio() {
                    this.aiModal.audioLoading = true;
                    // TTS LOGIC GOES HERE (Simulated for brevity)
                    setTimeout(() => { this.aiModal.audioLoading = false; this.showToast("🔊 กำลังเล่นเสียง...", "success"); }, 1500);
                },

                scrollTo(id) {
                    const el = document.getElementById('results-' + id);
                    if (el) document.getElementById('main-scroll-area').scrollTo({ top: el.offsetTop - 120, behavior: 'smooth' });
                },
                closeAIModal() { this.aiModal.show = false; }
            }));
        });
    </script>
</body>
</html>
