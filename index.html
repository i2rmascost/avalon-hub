<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Avalon Hub - ระบบบัญชาการสถิติและผลรางวัลระดับองค์กร">
    <meta name="theme-color" content="#0f172a">
    <title>Avalon Hub - Master Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ai-glow { box-shadow: 0 0 20px rgba(147, 51, 234, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pending-pulse { animation: pulse-opacity 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-opacity { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        /* Category Colors from Old Version */
        .cat-normal { border-left: 4px solid #3b82f6; }
        .cat-hanoi { border-left: 4px solid #ef4444; }
        .cat-laos { border-left: 4px solid #10b981; }
        .cat-vip { border-left: 4px solid #f59e0b; }
        .cat-special { border-left: 4px solid #8b5cf6; }
        .cat-visa { border-left: 4px solid #ec4899; }
        .cat-others { border-left: 4px solid #64748b; }
    </style>
</head>
<body class="antialiased overflow-hidden" x-data="avalonApp()">

    <!-- Header (Hybrid Design) -->
    <header class="fixed top-0 w-full glass z-50 flex justify-between items-center px-6 py-4 border-b border-white/10">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">AVALON HUB</h1>
            <span class="hidden md:inline text-xs text-slate-500 font-mono">v1.5 HYBRID</span>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="hidden lg:block text-xs text-slate-400">
                อัปเดตล่าสุด: <span x-text="lastUpdate" class="font-mono text-purple-400"></span>
            </div>
            <button @click="fetchData()" :disabled="isSyncing" 
                    class="bg-purple-600 hover:bg-purple-500 disabled:bg-slate-800 px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2 shadow-lg shadow-purple-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" :class="isSyncing ? 'animate-spin' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                <span x-text="isSyncing ? 'กำลังซิงค์...' : 'อัปเดตข้อมูล'"></span>
            </button>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="fixed top-[73px] w-full bg-slate-900/80 backdrop-blur-md z-40 border-b border-white/5">
        <div class="flex justify-center gap-8 py-3">
            <button @click="activeTab = 'results'" :class="activeTab === 'results' ? 'text-blue-400 border-blue-400' : 'text-slate-500 border-transparent'" class="pb-1 text-sm font-semibold border-b-2 transition">ผลรางวัลแบ่งกลุ่ม</button>
            <button @click="activeTab = 'timeline'" :class="activeTab === 'timeline' ? 'text-yellow-400 border-yellow-400' : 'text-slate-500 border-transparent'" class="pb-1 text-sm font-semibold border-b-2 transition">กระดานเวลา ⏳</button>
            <button @click="activeTab = 'analysis'" :class="activeTab === 'analysis' ? 'text-green-400 border-green-400' : 'text-slate-500 border-transparent'" class="pb-1 text-sm font-semibold border-b-2 transition">วิเคราะห์สถิติ</button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="flex pt-[125px] h-screen overflow-hidden">
        <!-- Sidebar (From Old Version) -->
        <aside x-show="activeTab === 'results'" class="w-40 md:w-56 flex-shrink-0 glass border-r border-white/5 h-full overflow-y-auto no-scrollbar pb-32">
            <div class="p-4 text-xs font-bold text-slate-500 uppercase tracking-widest">หมวดหมู่</div>
            <ul class="px-2 space-y-1">
                <template x-for="(label, key) in categories" :key="key">
                    <li>
                        <button @click="activeCategory = key" 
                                :class="activeCategory === key ? 'bg-purple-600/20 text-purple-400 border-l-4 border-purple-500' : 'text-slate-400 hover:bg-white/5 border-l-4 border-transparent'"
                                class="w-full text-left px-4 py-3 text-sm rounded-r-lg transition truncate font-medium" 
                                x-text="label"></button>
                    </li>
                </template>
            </ul>
        </aside>

        <!-- Main Dashboard -->
        <main class="flex-1 overflow-y-auto p-6 pb-32 scroll-smooth" id="main-scroll-area">
            
            <!-- Results Grid (Hybrid Style) -->
            <section x-show="activeTab === 'results'" class="space-y-6">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-2xl font-bold text-white" x-text="categories[activeCategory]"></h2>
                    <span class="text-xs text-slate-500" x-text="filteredLotteries.length + ' รายการ'"></span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <template x-for="item in filteredLotteries" :key="item.id">
                        <div :class="item.categoryId" class="glass p-5 rounded-2xl hover:scale-[1.02] transition cursor-pointer group relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-2 opacity-20 group-hover:opacity-100 transition">
                                <span class="text-2xl" x-text="getFlag(item.name)"></span>
                            </div>
                            
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter" x-text="item.id"></span>
                                <span :class="item.risk === 'OK' ? 'text-green-400' : 'text-yellow-400'" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-900/50" x-text="item.risk"></span>
                            </div>
                            
                            <h3 class="text-lg font-bold mb-5 text-slate-200 truncate pr-8" x-text="item.name"></h3>
                            
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-slate-900/80 p-3 rounded-xl border border-white/5 text-center">
                                    <div class="text-[10px] text-slate-500 uppercase mb-1">3 ตัวบน</div>
                                    <div class="text-2xl font-mono font-bold text-purple-400" :class="item.top3 === '***' ? 'pending-pulse text-slate-700' : ''" x-text="item.top3"></div>
                                </div>
                                <div class="bg-slate-900/80 p-3 rounded-xl border border-white/5 text-center">
                                    <div class="text-[10px] text-slate-500 uppercase mb-1">2 ตัวล่าง</div>
                                    <div class="text-2xl font-mono font-bold text-pink-400" :class="item.bottom2 === '**' ? 'pending-pulse text-slate-700' : ''" x-text="item.bottom2"></div>
                                </div>
                            </div>
                            
                            <div class="mt-5 pt-4 border-t border-white/5 flex justify-between items-center">
                                <div class="flex items-center gap-2">
                                    <svg class="w-3 h-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <span class="text-[10px] text-slate-500 font-mono" x-text="item.time"></span>
                                </div>
                                <button class="text-[10px] font-bold text-purple-500 hover:text-purple-400 transition uppercase tracking-widest">Details</button>
                            </div>
                        </div>
                    </template>
                </div>
            </section>

            <!-- Timeline View (From Old Version) -->
            <section x-show="activeTab === 'timeline'" class="max-w-4xl mx-auto">
                <div class="glass rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
                    <div class="bg-gradient-to-r from-slate-800 to-slate-900 p-4 flex items-center font-bold text-sm text-slate-300 border-b border-white/5">
                        <div class="w-20">เวลา</div>
                        <div class="flex-1">รายการ</div>
                        <div class="w-24 text-center">บน</div>
                        <div class="w-24 text-center">ล่าง</div>
                    </div>
                    <div class="divide-y divide-white/5">
                        <template x-for="lotto in sortedLotteries" :key="'tl-'+lotto.id">
                            <div class="flex items-center p-4 hover:bg-white/5 transition group">
                                <div class="w-20 font-mono text-xs text-yellow-500" x-text="lotto.time"></div>
                                <div class="flex-1 flex items-center gap-3">
                                    <span x-text="getFlag(lotto.name)"></span>
                                    <span class="font-semibold text-slate-200 text-sm" x-text="lotto.name"></span>
                                </div>
                                <div class="w-24 text-center font-mono font-bold text-purple-400" x-text="lotto.top3"></div>
                                <div class="w-24 text-center font-mono font-bold text-pink-400" x-text="lotto.bottom2"></div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Floating AI Icon -->
    <div id="ai-icon"
         class="fixed bottom-8 right-8 w-16 h-16 bg-gradient-to-br from-purple-600 to-blue-600 rounded-full shadow-2xl flex items-center justify-center cursor-pointer ai-glow z-50 text-3xl hover:scale-110 transition-transform"
         @click="showAIGuide = true">
      🤖
    </div>

    <!-- AI Guide Modal -->
    <div x-show="showAIGuide" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-8"
         x-transition:enter-end="opacity-100 translate-y-0"
         class="fixed bottom-28 right-8 z-[60] w-full max-w-sm">
        <div class="glass rounded-3xl overflow-hidden shadow-2xl border border-purple-500/30">
            <div class="bg-gradient-to-r from-purple-600 to-blue-600 p-5 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl">🤖</div>
                    <div>
                        <h2 class="font-bold text-white leading-tight">Avalon AI</h2>
                        <p class="text-[10px] text-white/70 uppercase tracking-widest">Online Assistant</p>
                    </div>
                </div>
                <button @click="showAIGuide = false" class="text-white/50 hover:text-white transition text-xl">✕</button>
            </div>
            <div class="p-6 space-y-4 bg-slate-900/90">
                <div class="bg-slate-800/50 p-4 rounded-2xl rounded-tl-none border border-white/5">
                    <p class="text-sm text-slate-300 leading-relaxed">สวัสดีครับ! ผมคือ AI ผู้ช่วยประจำ Avalon Hub พร้อมวิเคราะห์ข้อมูลและเก็งเทรนด์ให้คุณแล้วครับ</p>
                </div>
                <div class="grid grid-cols-1 gap-2">
                    <button class="text-left p-3 rounded-xl bg-white/5 hover:bg-purple-600/20 border border-white/5 text-xs text-slate-300 transition flex items-center gap-3">
                        <span class="text-lg">📊</span> วิเคราะห์แนวโน้มวันนี้
                    </button>
                    <button class="text-left p-3 rounded-xl bg-white/5 hover:bg-purple-600/20 border border-white/5 text-xs text-slate-300 transition flex items-center gap-3">
                        <span class="text-lg">🎯</span> เก็งเทรนด์เลขไหล
                    </button>
                    <button class="text-left p-3 rounded-xl bg-white/5 hover:bg-purple-600/20 border border-white/5 text-xs text-slate-300 transition flex items-center gap-3">
                        <span class="text-lg">⚙️</span> ตรวจสอบสถานะระบบ
                    </button>
                </div>
            </div>
            <div class="p-4 bg-slate-900 border-t border-white/5">
                <div class="relative">
                    <input type="text" placeholder="พิมพ์คำถามของคุณ..." class="w-full bg-slate-800 border border-white/10 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:border-purple-500 transition text-slate-200">
                    <button class="absolute right-3 top-2.5 text-purple-500 hover:text-purple-400">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function avalonApp() {
            return {
                lotteries: [],
                activeTab: 'results',
                activeCategory: 'all',
                showAIGuide: false,
                isSyncing: false,
                lastUpdate: '--:--',
                categories: {
                    all: 'ทั้งหมด',
                    'cat-normal': 'หุ้นต่างประเทศ',
                    'cat-hanoi': 'ฮานอย / เวียดนาม',
                    'cat-laos': 'ลาว / แม่โขง',
                    'cat-vip': 'VIP / พิเศษ',
                    'cat-special': 'หวยชุดพิเศษ',
                    'cat-visa': 'VISA / ทั่วโลก'
                },
                init() {
                    this.fetchData();
                    setInterval(() => this.fetchData(), 60000);
                },
                async fetchData() {
                    this.isSyncing = true;
                    try {
                        // รองรับทั้ง Local API และ Static JSON บน GitHub Pages
                        const url = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                                    ? '/api/v1/dashboard' 
                                    : 'api/v1/dashboard.json';
                        const res = await fetch(url);
                        const data = await res.json();
                        this.lotteries = data.lotteries;
                        this.lastUpdate = new Date().toLocaleTimeString();
                    } catch (e) {
                        console.error("Fetch error:", e);
                    } finally {
                        setTimeout(() => { this.isSyncing = false; }, 800);
                    }
                },
                get filteredLotteries() {
                    if (this.activeCategory === 'all') return this.lotteries;
                    return this.lotteries.filter(item => item.categoryId === this.activeCategory);
                },
                get sortedLotteries() {
                    return [...this.lotteries].sort((a, b) => a.time.localeCompare(b.time));
                },
                getFlag(name) {
                    const n = name.toLowerCase();
                    if (n.includes('hanoi')) return '🇻🇳';
                    if (n.includes('lao')) return '🇱🇦';
                    if (n.includes('set')) return '🇹🇭';
                    if (n.includes('dji')) return '🇺🇸';
                    if (n.includes('nikkei')) return '🇯🇵';
                    if (n.includes('hsi')) return '🇭🇰';
                    if (n.includes('ftse')) return '🇬🇧';
                    if (n.includes('dax')) return '🇩🇪';
                    if (n.includes('szse')) return '🇨🇳';
                    if (n.includes('twse')) return '🇹🇼';
                    if (n.includes('sgx')) return '🇸🇬';
                    return '🎲';
                }
            }
        }
    </script>
</body>
</html>
