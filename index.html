<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Avalon Hub - ระบบบัญชาการสถิติและผลรางวัลระดับองค์กร">
    <meta name="theme-color" content="#111827">
    <title>Avalon Hub - Dashboard V3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Toast Notification Animation */
        .toast-enter { transform: translateY(-100%); opacity: 0; }
        .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s ease-out; }
        .toast-leave-active { transform: translateY(-100%); opacity: 0; transition: all 0.3s ease-in; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased overflow-hidden" 
      x-data="avalonApp()" 
      @keydown.ctrl.r.prevent="!isSyncing && syncData()"
      @keydown.meta.r.prevent="!isSyncing && syncData()"> <div x-show="notification.show" 
         x-transition:enter="toast-enter-active" x-transition:enter-start="toast-enter"
         x-transition:leave="toast-leave-active" x-transition:leave-end="toast-enter"
         class="fixed top-16 left-1/2 transform -translate-x-1/2 z-[60] px-4 py-2 rounded shadow-lg font-semibold flex items-center gap-2"
         :class="notification.type === 'error' ? 'bg-red-600 text-white' : 'bg-green-600 text-white'"
         role="alert" aria-live="assertive">
         <span x-text="notification.message"></span>
    </div>

    <header class="fixed top-0 w-full bg-gray-800 shadow-md z-50 flex justify-between items-center px-4 py-3 border-b border-gray-700">
        <h1 class="text-xl font-bold text-blue-400 focus:outline-none" tabindex="0">AVALON HUB</h1>
        <div class="flex items-center gap-4 text-sm">
            <div class="hidden md:block text-gray-500" aria-label="เวลาอัปเดตล่าสุด">
                อัปเดตล่าสุด: <span x-text="lastSyncTime"></span>
            </div>
            <div class="text-gray-400" aria-live="polite">
                รีเฟรชใน: <span x-text="countdown" class="font-mono font-bold transition-colors" :class="countdown <= 10 ? 'text-red-400' : 'text-yellow-400'"></span> วิ.
            </div>
            <button @click="!isSyncing && syncData()" :disabled="isSyncing" aria-label="ซิงค์ข้อมูลผลรางวัล (Ctrl+R)" 
                    class="bg-blue-600 hover:bg-blue-500 disabled:bg-gray-600 px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-white">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" :class="isSyncing ? 'animate-spin' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                <span x-text="isSyncing ? 'กำลังซิงค์...' : 'ซิงค์ข้อมูล'"></span>
            </button>
        </div>
    </header>

    <nav class="fixed top-[52px] w-full bg-gray-900 z-40 border-b border-gray-700" aria-label="Main Navigation">
        <div class="flex justify-center gap-8 py-2" role="tablist">
            <button id="tab-results" @click="activeTab = 'results'" role="tab" :aria-selected="activeTab === 'results'" aria-controls="panel-results"
                    :class="activeTab === 'results' ? 'text-blue-400 border-blue-400' : 'text-gray-400 border-transparent'" 
                    class="pb-1 font-semibold border-b-2 transition focus:outline-none focus:text-blue-300">ผลรางวัลรวม</button>
            <button id="tab-flows" @click="activeTab = 'flows'" role="tab" :aria-selected="activeTab === 'flows'" aria-controls="panel-flows"
                    :class="activeTab === 'flows' ? 'text-green-400 border-green-400' : 'text-gray-400 border-transparent'" 
                    class="pb-1 font-semibold border-b-2 transition focus:outline-none focus:text-green-300">สถิติเลขไหล</button>
        </div>
    </nav>

    <div class="flex pt-[100px] h-screen overflow-hidden">
        
        <nav class="w-32 md:w-48 flex-shrink-0 bg-gray-800 border-r border-gray-700 h-full overflow-y-auto no-scrollbar pb-20" aria-label="Category Navigation">
            <ul class="p-2 space-y-1" role="list">
                <template x-for="category in categories" :key="category.id">
                    <li>
                        <button @click="scrollTo(category.id)" 
                                class="w-full text-left px-3 py-2 text-sm rounded hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" 
                                x-text="category.name" :aria-label="'เลื่อนไปยังหมวดหมู่ ' + category.name"></button>
                    </li>
                </template>
            </ul>
        </nav>

        <main class="flex-1 overflow-y-auto p-4 pb-24 scroll-smooth" id="main-scroll-area" aria-live="polite">
            
            <section id="panel-results" x-show="activeTab === 'results'" role="tabpanel" aria-labelledby="tab-results">
                
                <template x-if="isSyncing && lotteriesData.length === 0">
                    <div class="space-y-6">
                        <div class="h-8 bg-gray-800 rounded w-1/4 animate-pulse"></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <div class="h-32 bg-gray-800 rounded-lg animate-pulse"></div>
                            <div class="h-32 bg-gray-800 rounded-lg animate-pulse"></div>
                            <div class="h-32 bg-gray-800 rounded-lg animate-pulse"></div>
                        </div>
                    </div>
                </template>

                <template x-if="!isSyncing || lotteriesData.length > 0">
                    <div>
                        <template x-for="category in categories" :key="category.id">
                            <div :id="'results-' + category.id" class="mb-8">
                                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2 text-blue-300" x-text="category.name" tabindex="0"></h2>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    <template x-for="lotto in getLotteriesByCategory(category.id)" :key="lotto.id">
                                        <article class="bg-gray-800 rounded-lg p-4 border border-gray-700 shadow-sm relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-blue-500 transition hover:bg-gray-750" tabindex="0">
                                            <time :datetime="lotto.time" class="absolute top-0 right-0 bg-blue-600 text-xs px-2 py-1 rounded-bl-lg font-mono" x-text="lotto.time"></time>
                                            <h3 class="text-md font-semibold text-gray-200 mb-2" x-text="lotto.name"></h3>
                                            <div class="flex justify-between items-center bg-gray-900 p-2 rounded">
                                                <div class="text-center w-1/2 border-r border-gray-700">
                                                    <div class="text-xs text-gray-500">3 ตัวบน</div>
                                                    <div class="text-2xl font-bold text-red-400" x-text="lotto.top3"></div>
                                                </div>
                                                <div class="text-center w-1/2">
                                                    <div class="text-xs text-gray-500">2 ตัวล่าง</div>
                                                    <div class="text-2xl font-bold text-blue-400" x-text="lotto.bottom2"></div>
                                                </div>
                                            </div>
                                            <button class="w-full mt-2 text-xs text-right text-gray-500 hover:text-blue-300 transition focus:outline-none focus:underline" aria-label="ดูงวดย้อนหลัง">
                                                งวดย้อนหลัง 100 งวด &#9654;
                                            </button>
                                        </article>
                                    </template>
                                </div>

                                <template x-if="getLotteriesByCategory(category.id).length === 0">
                                    <div class="text-center py-6 text-gray-600 bg-gray-800/50 rounded-lg border border-gray-700 border-dashed">
                                        ไม่มีข้อมูลผลรางวัลในหมวดหมู่นี้
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>
            </section>

            <section id="panel-flows" x-show="activeTab === 'flows'" role="tabpanel" aria-labelledby="tab-flows" style="display: none;">
                 <div class="text-gray-400 text-center py-10 border border-gray-700 border-dashed rounded-lg bg-gray-800/30">
                     [โมดูลประมวลผลสถิติอดีต 4 หลัก... สถานะ: รอการเชื่อมต่อ API จาก AVALON CORE]
                 </div>
            </section>

        </main>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('avalonApp', () => ({
                activeTab: 'results',
                countdown: 60,
                isSyncing: false,
                lastSyncTime: '--:--',
                notification: { show: false, message: '', type: 'success' }, // Toast State
                categories: [
                    { id: 'cat-normal', name: 'หวยหุ้นปกติ' },
                    { id: 'cat-hanoi', name: 'หวยรายวัน ฮานอย' }
                ],
                lotteriesData: [
                    { id: 'dji', categoryId: 'cat-normal', name: 'ดาวโจนส์', time: '03:20', top3: '225', bottom2: '42' },
                    { id: 'hanoi-v', categoryId: 'cat-hanoi', name: 'ฮานอย VISA', time: '16:15', top3: '---', bottom2: '--' }
                ],
                
                init() {
                    this.updateLastSyncTime();
                    setInterval(() => {
                        if(this.countdown > 0 && !this.isSyncing) {
                            this.countdown--;
                        } else if (this.countdown === 0 && !this.isSyncing) {
                            this.syncData();
                        }
                    }, 1000);
                },

                getLotteriesByCategory(catId) {
                    return this.lotteriesData.filter(l => l.categoryId === catId);
                },

                updateLastSyncTime() {
                    const now = new Date();
                    this.lastSyncTime = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                },

                showToast(message, type = 'success') {
                    this.notification.message = message;
                    this.notification.type = type;
                    this.notification.show = true;
                    setTimeout(() => { this.notification.show = false; }, 3000);
                },

                // [Data Validation & Error States]
                async syncData() {
                    if (this.isSyncing) return;
                    this.isSyncing = true;
                    console.log("THE AXIOM: Executing Secure Data Fetch...");
                    
                    try {
                        // จำลอง Fetch API
                        await new Promise((resolve, reject) => {
                            setTimeout(() => {
                                // จำลองโอกาสเกิด Error 10% เพื่อทดสอบ Error State
                                if (Math.random() < 0.1) reject(new Error("HTTP 503: Service Unavailable"));
                                resolve({
                                    ok: true,
                                    json: () => Promise.resolve({
                                        lotteries: [
                                            { id: 'dji', categoryId: 'cat-normal', name: 'ดาวโจนส์', time: '03:20', top3: Math.floor(100+Math.random()*900).toString(), bottom2: Math.floor(10+Math.random()*90).toString() },
                                            { id: 'hanoi-v', categoryId: 'cat-hanoi', name: 'ฮานอย VISA', time: '16:15', top3: '888', bottom2: '99' }
                                        ]
                                    })
                                });
                            }, 1500);
                        });

                        // สมมติว่าได้ Response
                        const fakeResponse = { ok: true, lotteries: [ /* ... */ ] }; // ข้ามการเช็ค response.ok จริงๆ ไปก่อนในม็อคนี้
                        
                        // จำลอง Data ที่ได้มาแล้ว Validate
                        const incomingData = [
                             { id: 'dji', categoryId: 'cat-normal', name: 'ดาวโจนส์', time: '03:20', top3: Math.floor(100+Math.random()*900).toString(), bottom2: Math.floor(10+Math.random()*90).toString() },
                             { id: 'hanoi-v', categoryId: 'cat-hanoi', name: 'ฮานอย VISA', time: '16:15', top3: '888', bottom2: '99' }
                        ];

                        if (!Array.isArray(incomingData)) throw new Error('Invalid data format: Expected Array');
                        
                        this.lotteriesData = incomingData;
                        this.countdown = 60;
                        this.updateLastSyncTime();
                        this.showToast("ซิงค์ข้อมูลสำเร็จ", "success");

                    } catch (error) {
                        console.error("THE AXIOM: Sync Failed -", error.message);
                        this.showToast(`การซิงค์ล้มเหลว: ${error.message}`, "error");
                        // ไม่รีเซ็ตเวลาถอยหลัง ให้ลองใหม่รอบหน้า หรือกดเอง
                    } finally {
                        this.isSyncing = false;
                    }
                },

                scrollTo(id) {
                    const prefix = this.activeTab === 'results' ? 'results-' : 'flows-';
                    const element = document.getElementById(prefix + id);
                    const container = document.getElementById('main-scroll-area');
                    if (element && container) {
                        container.scrollTo({ top: element.offsetTop - 120, behavior: 'smooth' });
                        element.querySelector('h2')?.focus(); // [Focus Management] ย้ายโฟกัสไปที่หัวข้อที่เลื่อนไป
                    }
                }
            }));
        });
    </script>
</body>
</html>
