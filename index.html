<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Avalon Hub - ระบบบัญชาการสถิติและผลรางวัลระดับองค์กร">
    <meta name="theme-color" content="#111827">
    <title>Avalon Hub - Master Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-enter { opacity: 0; transform: translate(-50%, -1rem); }
        .toast-enter-active { transition: all 0.3s ease-out; }
        .toast-leave-active { transition: all 0.2s ease-in; opacity: 0; transform: translate(-50%, -1rem); }
        .ai-glow { animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow {
            from { box-shadow: 0 0 5px #3b82f6, 0 0 10px #3b82f6; }
            to { box-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6; }
        }
        .pending-pulse { animation: pulse-opacity 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-opacity {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased overflow-hidden" 
      x-data="avalonApp()" 
      @keydown.ctrl.r.prevent="!isSyncing && syncData()"
      @keydown.meta.r.prevent="!isSyncing && syncData()">

    <!-- แจ้งเตือนระบบ -->
    <div x-show="notification.show" 
         x-transition:enter="toast-enter-active" x-transition:enter-start="toast-enter"
         x-transition:leave="toast-leave-active" x-transition:leave-end="toast-enter"
         class="fixed top-16 left-1/2 transform -translate-x-1/2 z-[60] px-4 py-2 rounded shadow-lg font-semibold flex items-center gap-2 border border-gray-700"
         :class="notification.type === 'error' ? 'bg-red-900 text-red-100' : (notification.type === 'warning' ? 'bg-yellow-600 text-white' : 'bg-green-800 text-green-100')"
         role="alert">
         <span x-text="notification.message"></span>
    </div>

    <!-- ส่วนหัวบัญชาการ -->
    <header class="fixed top-0 w-full bg-gray-800 shadow-md z-50 flex justify-between items-center px-4 py-3 border-b border-gray-700 overflow-x-auto no-scrollbar">
        <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 flex-shrink-0 mr-4">AVALON HUB</h1>
        
        <div class="flex items-center gap-2 sm:gap-3 text-sm flex-nowrap min-w-max">
            <div class="hidden xl:block text-gray-500 mr-2">
                อัปเดต: <span x-text="lastSyncTime" class="font-mono text-gray-300"></span>
            </div>
            
            <!-- THE AXIOM: ปุ่มบังคับขุดข้อมูล -->
            <button @click="!isSyncing && forceMineData()" :disabled="isSyncing" 
                    class="bg-orange-600/80 hover:bg-orange-500 border border-orange-400 disabled:bg-gray-800 disabled:text-gray-500 text-white px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1 focus:ring-2 focus:ring-orange-300">
                <span class="hidden md:inline">บังคับขุดข้อมูล</span> ⚡
            </button>

            <button @click="!isSyncing && analyzeFrequency()" :disabled="isSyncing || lotteriesData.length === 0" 
                    class="bg-indigo-900/60 hover:bg-indigo-800 border border-indigo-500/50 text-indigo-300 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1">
                <span class="hidden md:inline">สแกนความถี่</span> 🔍
            </button>

            <button @click="!isSyncing && analyzeLuckyPicks()" :disabled="isSyncing || lotteriesData.length === 0" 
                    class="bg-red-900/60 hover:bg-red-800 border border-red-500/50 text-red-300 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1">
                <span class="hidden md:inline">เก็งเทรนด์เลข</span> 🎯
            </button>

            <button @click="!isSyncing && analyzeMarketSummary()" :disabled="isSyncing || lotteriesData.length === 0" 
                    class="bg-purple-900/60 hover:bg-purple-800 border border-purple-500/50 text-purple-300 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1">
                <span class="hidden sm:inline">สรุปตลาด</span> ✨
            </button>

            <button @click="!isSyncing && syncData()" :disabled="isSyncing" 
                    class="bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 px-2 sm:px-3 py-1 rounded font-semibold transition flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" :class="isSyncing ? 'animate-spin' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                <span x-text="isSyncing ? 'ซิงค์...' : 'อัปเดต'" class="hidden sm:inline"></span>
            </button>
        </div>
    </header>

    <!-- แถบเลือก Tab -->
    <nav class="fixed top-[52px] w-full bg-gray-900 z-40 border-b border-gray-700">
        <div class="flex justify-center gap-8 py-2">
            <button @click="activeTab = 'results'" :class="activeTab === 'results' ? 'text-blue-400 border-blue-400' : 'text-gray-400 border-transparent'" class="pb-1 font-semibold border-b-2 transition">ผลรางวัลแบ่งกลุ่ม</button>
            <button @click="activeTab = 'timeline'" :class="activeTab === 'timeline' ? 'text-yellow-400 border-yellow-400' : 'text-gray-400 border-transparent'" class="pb-1 font-semibold border-b-2 transition">กระดานเวลา ⏳</button>
            <button @click="activeTab = 'flows'" :class="activeTab === 'flows' ? 'text-green-400 border-green-400' : 'text-gray-400 border-transparent'" class="pb-1 font-semibold border-b-2 transition">สถิติเลขไหล</button>
        </div>
    </nav>

    <!-- เนื้อหาหลัก -->
    <div class="flex pt-[100px] h-screen overflow-hidden">
        <!-- Sidebar หมวดหมู่ -->
        <nav x-show="activeTab !== 'timeline'" class="w-32 md:w-48 flex-shrink-0 bg-gray-800 border-r border-gray-700 h-full overflow-y-auto no-scrollbar pb-20">
            <ul class="p-2 space-y-1">
                <template x-for="category in categories" :key="category.id">
                    <li>
                        <button @click="scrollTo(category.id)" class="w-full text-left px-3 py-2 text-sm rounded hover:bg-gray-700 transition truncate" x-text="category.name"></button>
                    </li>
                </template>
            </ul>
        </nav>

        <main class="flex-1 overflow-y-auto p-4 pb-24 scroll-smooth bg-gray-900" id="main-scroll-area">
            
            <!-- TAB 1: ผลรางวัลแบ่งกลุ่ม -->
            <section x-show="activeTab === 'results'">
                <template x-for="category in categories" :key="category.id">
                    <div :id="'results-' + category.id" class="mb-10 pt-2" x-show="getLotteriesByCategory(category.id).length > 0">
                        <h2 class="text-xl font-bold mb-4 text-blue-300" x-text="category.name"></h2>
                        <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700 shadow-lg">
                            <div class="bg-[#8b0000] text-white flex items-center px-4 py-2 font-bold text-sm md:text-base border-b border-red-900">
                                <div class="flex-1">รายการหวย</div>
                                <div class="w-20 md:w-32 text-center">3 ตัวบน</div>
                                <div class="w-20 md:w-32 text-center">2 ตัวล่าง</div>
                                <div class="w-16 text-center">สถานะ</div> 
                            </div>
                            <div class="divide-y divide-gray-700">
                                <template x-for="lotto in getLotteriesByCategory(category.id)" :key="lotto.id">
                                    <div class="flex items-center px-4 py-3 transition group bg-gray-800 even:bg-gray-800/50" :class="lotto.risk === 'WAIT' ? 'opacity-80' : 'hover:bg-gray-750'">
                                        <div class="flex-1 flex items-center gap-2 md:gap-3 min-w-0">
                                            <span class="text-lg md:text-xl drop-shadow-md" x-text="getFlag(lotto.name)"></span>
                                            <span class="font-semibold text-gray-200 text-sm md:text-base truncate" x-text="lotto.name"></span>
                                            <span class="bg-gray-900 text-gray-400 text-[10px] md:text-xs px-2 py-0.5 rounded-full font-mono border border-gray-700 flex-shrink-0" x-text="lotto.time"></span>
                                        </div>
                                        <div class="w-20 md:w-32 text-center">
                                            <span class="font-bold text-lg md:text-xl font-mono tracking-wider" :class="lotto.top3 === '***' ? 'text-gray-600 pending-pulse' : 'text-red-400'" x-text="lotto.top3"></span>
                                        </div>
                                        <div class="w-20 md:w-32 text-center">
                                            <span class="font-bold text-lg md:text-xl font-mono tracking-wider" :class="lotto.bottom2 === '**' ? 'text-gray-600 pending-pulse' : 'text-blue-400'" x-text="lotto.bottom2"></span>
                                        </div>
                                        <div class="w-16 text-right flex justify-end items-center gap-2">
                                            <template x-if="lotto.risk !== 'WAIT'">
                                                <button @click="analyzeLottoWithAI(lotto, 'result')" class="text-purple-400 hover:text-purple-300 bg-purple-900/30 p-1.5 rounded transition opacity-70 group-hover:opacity-100">✨</button>
                                            </template>
                                            <template x-if="lotto.risk === 'WAIT'">
                                                <span class="text-gray-600"><svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></span>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </section>

            <!-- TAB 2: กระดานเวลารวม (Master Timeline) -->
            <section x-show="activeTab === 'timeline'" style="display: none;">
                <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700 shadow-lg mb-8">
                    <div class="bg-gradient-to-r from-yellow-900 to-yellow-800 text-white flex items-center px-4 py-3 font-bold">
                        <div class="flex-1">เวลา / รายการ</div>
                        <div class="w-20 md:w-32 text-center">3 ตัวบน</div>
                        <div class="w-20 md:w-32 text-center">2 ตัวล่าง</div>
                        <div class="w-10"></div>
                    </div>
                    <div class="divide-y divide-gray-700">
                        <template x-for="lotto in getAllLotteriesSortedByTime()" :key="'tl-'+lotto.id">
                            <div class="flex items-center px-4 py-2.5 transition group bg-gray-800 even:bg-gray-800/50 hover:bg-gray-750" :class="lotto.risk === 'WAIT' ? 'opacity-70' : ''">
                                <div class="flex-1 flex items-center gap-2 min-w-0">
                                    <span class="bg-yellow-900/50 text-yellow-400 text-[10px] px-2 py-1 rounded font-mono" x-text="lotto.time"></span>
                                    <span x-text="getFlag(lotto.name)"></span>
                                    <span class="font-semibold text-gray-200 truncate" x-text="lotto.name"></span>
                                </div>
                                <div class="w-20 md:w-32 text-center font-bold font-mono" :class="lotto.top3 === '***' ? 'text-gray-600' : 'text-red-400'" x-text="lotto.top3"></div>
                                <div class="w-20 md:w-32 text-center font-bold font-mono" :class="lotto.bottom2 === '**' ? 'text-gray-600' : 'text-blue-400'" x-text="lotto.bottom2"></div>
                                <div class="w-10">
                                    <template x-if="lotto.risk !== 'WAIT'">
                                        <button @click="analyzeLottoWithAI(lotto, 'result')" class="text-purple-400 opacity-50 group-hover:opacity-100">✨</button>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>

            <!-- TAB 3: สถิติเลขไหล -->
            <section x-show="activeTab === 'flows'" style="display: none;">
                <template x-for="category in categories" :key="category.id">
                    <div class="mb-8" x-show="getLotteriesByCategory(category.id).filter(l => l.risk !== 'WAIT').length > 0">
                        <h2 class="text-xl font-bold mb-4 text-green-300" x-text="category.name"></h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <template x-for="lotto in getLotteriesByCategory(category.id).filter(l => l.risk !== 'WAIT')">
                                <div class="bg-gray-800 rounded-lg p-3 border border-gray-700">
                                    <div class="flex justify-between mb-2">
                                        <div class="flex gap-2"><span x-text="getFlag(lotto.name)"></span><span class="font-semibold" x-text="lotto.name"></span></div>
                                        <button @click="analyzeLottoWithAI(lotto, 'flow')" class="text-[10px] bg-purple-900/50 text-purple-300 px-2 py-0.5 rounded">เจาะลึก 🔮</button>
                                    </div>
                                    <div class="flex gap-2 text-center">
                                        <div class="flex-1 bg-gray-900 rounded p-1"><div class="text-[9px] text-gray-500">ล่าสุด</div><div class="text-green-400 font-bold" x-text="lotto.flow_today.join('-')"></div></div>
                                        <div class="flex-1 bg-gray-900 rounded p-1"><div class="text-[9px] text-gray-500">อดีต</div><div class="text-blue-400 font-bold" x-text="lotto.flow_history.join('-')"></div></div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </section>
        </main>
    </div>

    <!-- AI Modal -->
    <div x-show="aiModal.show" style="display: none;" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
        <div class="bg-gray-800 border border-purple-500/50 shadow-2xl rounded-xl max-w-md w-full flex flex-col" @click.outside="closeAIModal()">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900">
                <h3 class="text-lg font-bold text-purple-400 flex items-center gap-2"><span x-text="getModalIcon()"></span> <span x-text="aiModal.title"></span></h3>
                <button @click="closeAIModal()" class="text-gray-400 hover:text-white">✕</button>
            </div>
            <div class="p-5 min-h-[150px] max-h-[60vh] overflow-y-auto bg-gray-900">
                <div x-show="aiModal.loading" class="flex flex-col items-center py-6"><div class="w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div><p class="mt-3 text-purple-300">ประมวลผลสถิติมหาภพ...</p></div>
                <div x-show="!aiModal.loading" class="text-gray-200 text-sm leading-relaxed" x-text="aiModal.content"></div>
            </div>
            <div class="p-3 border-t border-gray-700 flex justify-between bg-gray-800">
                <button @click="playAIAudio()" :disabled="aiModal.loading || !aiModal.content" class="px-3 py-1.5 bg-indigo-900/50 text-indigo-300 border border-indigo-700 rounded text-sm transition">🔊 ฟังเสียง</button>
                <button @click="closeAIModal()" class="px-4 py-2 bg-gray-700 text-white rounded text-sm">ปิด</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('avalonApp', () => ({
                activeTab: 'results', countdown: 60, isSyncing: false, lastSyncTime: '--:--',
                notification: { show: false, message: '', type: 'success' },
                aiModal: { show: false, title: '', content: '', loading: false, mode: 'result' },
                lotteriesData: [],
                CONFIG: {
                    TOKEN: 'AXIOM_SECURE_TOKEN_V3_2026',
                    BASE_API: 'http://127.0.0.1:8000/api/v1'
                },
                categories: [
                    { id: 'cat-normal', name: 'หุ้นปกติ (เรียงตามเวลา)' }, { id: 'cat-vip', name: 'หวยหุ้นวีไอพี' }, { id: 'cat-special', name: 'หวยหุ้นพิเศษ' },
                    { id: 'cat-hanoi', name: 'หวยรายวัน ฮานอย' }, { id: 'cat-laos', name: 'หวยรายวัน ลาว' }, { id: 'cat-visa', name: 'หวยหุ้นวีซ่า' }, { id: 'cat-others', name: 'หวยอื่นๆ' }
                ],
                init() { this.syncData(); setInterval(() => { if(this.countdown > 0 && !this.isSyncing && !this.aiModal.show) this.countdown--; else if (this.countdown === 0) this.syncData(); }, 1000); },
                getLotteriesByCategory(catId) { return this.lotteriesData.filter(l => l.categoryId === catId).sort((a, b) => a.time.localeCompare(b.time)); },
                getCategoryName(catId) { const cat = this.categories.find(c => c.id === catId); return cat ? cat.name : ''; },
                getAllLotteriesSortedByTime() { return [...this.lotteriesData].sort((a, b) => a.time.localeCompare(b.time)); },
                getModalIcon() { const icons = { summary: '🌍', lucky: '🎯', scan: '🔍', flow: '🔮', result: '✨' }; return icons[this.aiModal.mode] || '✨'; },
                updateLastSyncTime() { this.lastSyncTime = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); },
                showToast(message, type = 'success') { this.notification = { show: true, message, type }; setTimeout(() => this.notification.show = false, 3500); },
                
                getFlag(name) {
                    const n = name.toLowerCase();
                    if (n.includes('ดาวโจนส์')) return '🇺🇸'; if (n.includes('นิเคอิ')) return '🇯🇵';
                    if (n.includes('จีน')) return '🇨🇳'; if (n.includes('ฮั่งเส็ง') || n.includes('ฮ่องกง')) return '🇭🇰';
                    if (n.includes('ไทย') || n.includes('ธ.ก.ส.') || n.includes('ออมสิน') || n.includes('รัฐบาล')) return '🇹🇭';
                    if (n.includes('ลาว') || n.includes('สาละวัน') || n.includes('หลวงพระบาง') || n.includes('เวียงจันทน์') || n.includes('แม่โขง')) return '🇱🇦';
                    if (n.includes('ฮานอย') || n.includes('เวียดนาม')) return '🇻🇳'; if (n.includes('มาเลย์')) return '🇲🇾';
                    if (n.includes('เยอรมัน') || n.includes('ยูโร')) return '🇩🇪'; if (n.includes('อังกฤษ')) return '🇬🇧';
                    if (n.includes('รัสเซีย')) return '🇷🇺'; if (n.includes('อินเดีย')) return '🇮🇳';
                    return '🌐';
                },

                async syncData() {
                    this.isSyncing = true;
                    try {
                        const response = await fetch(`${this.CONFIG.BASE_API}/dashboard`, { headers: { 'x-token': this.CONFIG.TOKEN } });
                        if (response.ok) {
                            const incoming = await response.json();
                            this.lotteriesData = incoming.lotteries;
                            this.updateLastSyncTime();
                        }
                    } catch (e) { this.showToast("สูญเสียการเชื่อมต่อแกนกลาง", "error"); }
                    finally { this.isSyncing = false; this.countdown = 60; }
                },

                // THE AXIOM: บังคับดึงข้อมูล (Integrated with v7.4)
                async forceMineData() {
                    this.showToast("⚡ เริ่มการขุดข้อมูลมหาภพ... โปรดดู Terminal!", "warning");
                    try {
                        const response = await fetch(`${this.CONFIG.BASE_API}/force-mine`, {
                            method: 'POST', headers: { 'x-token': this.CONFIG.TOKEN }
                        });
                        if (response.ok) {
                            setTimeout(() => { this.syncData(); this.showToast("✅ อัดฉีดข้อมูลเรียบร้อย", "success"); }, 15000);
                        }
                    } catch (e) { this.showToast("คำสั่งรบขัดข้อง", "error"); }
                },

                async fetchGeminiWithRetry(prompt) {
                    const apiKey = ""; // ใส่ API Key ของคุณที่นี่
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "คุณคือ 'Axiom Oracle' ผู้เชี่ยวชาญสถิติ ตอบสั้น กระชับ ไม่เกิน 4 ประโยค" }] } };
                    try {
                        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                        const data = await res.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "ดวงดาวสับสน...";
                    } catch (e) { return "สัญญาณแทรกซ้อน..."; }
                },

                async analyzeLottoWithAI(lotto, mode) {
                    this.aiModal = { show: true, title: lotto.name, content: '', loading: true, mode };
                    const prompt = mode === 'flow' ? `วิเคราะห์สถิติไหล ${lotto.name}: ${lotto.flow_today.join('-')}` : `วิเคราะห์ผลล่าสุด ${lotto.name}: ${lotto.top3}, ${lotto.bottom2}`;
                    this.aiModal.content = await this.fetchGeminiWithRetry(prompt);
                    this.aiModal.loading = false;
                },

                async analyzeMarketSummary() {
                    this.aiModal = { show: true, title: 'สรุปตลาด', content: '', loading: true, mode: 'summary' };
                    const summary = this.lotteriesData.filter(l => l.risk !== 'WAIT').map(l => `${l.name}:${l.top3}`).join('|');
                    this.aiModal.content = await this.fetchGeminiWithRetry(`สรุปภาพรวมตลาดวันนี้: ${summary}`);
                    this.aiModal.loading = false;
                },

                async analyzeFrequency() {
                    this.aiModal = { show: true, title: 'สแกนความถี่', content: '', loading: true, mode: 'scan' };
                    const nums = this.lotteriesData.filter(l => l.risk !== 'WAIT').map(l => `${l.top3},${l.bottom2}`).join(',');
                    this.aiModal.content = await this.fetchGeminiWithRetry(`สแกนหาเลขแข็ง/เลขอ่อนประจำวันจากชุดเลขนี้: ${nums}`);
                    this.aiModal.loading = false;
                },

                async analyzeLuckyPicks() {
                    this.aiModal = { show: true, title: 'เก็งเทรนด์เลข', content: '', loading: true, mode: 'lucky' };
                    this.aiModal.content = await this.fetchGeminiWithRetry("คำนวณแนวโน้มเลขนำโชค 3 ชุดสำหรับรอบถัดไป");
                    this.aiModal.loading = false;
                },

                async playAIAudio() { this.showToast("🔊 กำลังเตรียมเสียงพยากรณ์...", "success"); },
                scrollTo(id) { 
                    const el = document.getElementById('results-' + id);
                    if (el) document.getElementById('main-scroll-area').scrollTo({ top: el.offsetTop - 120, behavior: 'smooth' }); 
                },
                closeAIModal() { this.aiModal.show = false; }
            }));
        });
    </script>
</body>
</html>
